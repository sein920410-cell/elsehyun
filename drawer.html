<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공간 : 결 - 서랍 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 사진 2번 스타일: 카테고리 그룹 디자인 */
        .category-group { border-bottom: 1px solid #eee; }
        .category-header { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: #f9f9f9; cursor: pointer; font-weight: bold;
        }
        .item-row { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; border-top: 1px solid #f0f0f0;
        }
        .arrow { transition: transform 0.3s; }
        .arrow.open { transform: rotate(180deg); }
        
        /* 기존 UI 유지 */
        .btn-action { font-size: 0.8rem; padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; }
        #media-preview-container { width: 100%; height: 250px; background: #eee; overflow: hidden; display: none; position: relative; }
        #media-preview-container img, #media-preview-container video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="bg-white">

    <div id="media-preview-container">
        </div>

    <div class="p-4 flex justify-between items-center border-b">
        <button onclick="toggleAllGroups()" class="text-sm text-gray-600">전체 펼치기/접기</button>
        <button onclick="handleFullReset()" class="text-sm text-red-500 font-bold">전체 초기화</button>
    </div>

    <div id="inventory-list">
        </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('inventory')) || [];
        let expandedCategories = new Set(); // 펼쳐진 카테고리 저장

        // 1. 전체 초기화 (사진/영상까지 싹 삭제)
        function handleFullReset() {
            if (confirm("목록과 업로드된 사진/영상을 모두 지우시겠습니까?")) {
                inventory = [];
                localStorage.removeItem('inventory');
                
                // 사진/영상 영역 비우기
                const mediaContainer = document.getElementById('media-preview-container');
                mediaContainer.innerHTML = '';
                mediaContainer.style.display = 'none';
                localStorage.removeItem('lastUploadedMedia'); // 저장된 경로 삭제
                
                renderList();
            }
        }

        // 2. 카테고리별 그룹화 및 렌더링
        function renderList() {
            const listContainer = document.getElementById('inventory-list');
            listContainer.innerHTML = '';

            if (inventory.length === 0) {
                listContainer.innerHTML = '<p class="text-center py-10 text-gray-400">등록된 물품이 없습니다.</p>';
                return;
            }

            // 카테고리별로 묶기
            const grouped = inventory.reduce((acc, item) => {
                const cat = item.category || "미분류";
                if (!acc[cat]) acc[cat] = [];
                acc[cat].push(item);
                return acc;
            }, {});

            Object.keys(grouped).forEach(category => {
                const isOpen = expandedCategories.has(category);
                
                const groupDiv = document.createElement('div');
                groupDiv.className = 'category-group';
                
                groupDiv.innerHTML = `
                    <div class="category-header" onclick="toggleCategory('${category}')">
                        <span>${category} (${grouped[category].length})</span>
                        <span class="arrow ${isOpen ? 'open' : ''}">▼</span>
                    </div>
                    <div class="category-content" style="display: ${isOpen ? 'block' : 'none'}">
                        ${grouped[category].map((item, idx) => `
                            <div class="item-row">
                                <div>
                                    <div class="font-medium">${item.name}</div>
                                    <div class="flex gap-2 mt-1">
                                        <button class="btn-action" onclick="editItem('${item.id}')">편집</button>
                                        <button class="btn-action text-red-500" onclick="deleteItem('${item.id}')">삭제</button>
                                    </div>
                                </div>
                                <div class="flex items-center gap-3">
                                    <button onclick="changeQty('${item.id}', -1)" class="w-8 h-8 border rounded">-</button>
                                    <span class="w-5 text-center">${item.quantity}</span>
                                    <button onclick="changeQty('${item.id}', 1)" class="w-8 h-8 border rounded">+</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                listContainer.appendChild(groupDiv);
            });
        }

        // 카테고리 개별 토글
        function toggleCategory(category) {
            if (expandedCategories.has(category)) {
                expandedCategories.delete(category);
            } else {
                expandedCategories.add(category);
            }
            renderList();
        }

        // 전체 토글
        function toggleAllGroups() {
            const allCategories = [...new Set(inventory.map(i => i.category || "미분류"))];
            if (expandedCategories.size > 0) {
                expandedCategories.clear();
            } else {
                allCategories.forEach(c => expandedCategories.add(c));
            }
            renderList();
        }

        // 수량 및 삭제 함수는 기존 로직 그대로 유지 (생략)
        function changeQty(id, change) {
            const item = inventory.find(i => i.id === id);
            if (item) {
                item.quantity = Math.max(1, item.quantity + change);
                saveAndRender();
            }
        }

        function deleteItem(id) {
            inventory = inventory.filter(i => i.id !== id);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('inventory', JSON.stringify(inventory));
            renderList();
        }

        // 초기 실행
        renderList();
    </script>
</body>
</html>
