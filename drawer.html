<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>공간:결</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --h-bg:#0C1220;--h-border:rgba(255,255,255,0.08);--h-btn:rgba(255,255,255,0.08);
  --bg:#F0F2F6;--surface:#FFFFFF;--border:#E2E6EF;--border2:#D4D9E6;
  --ink:#1A1F2E;--ink2:#3A4050;--muted:#7A88A0;--muted2:#A4ADBE;
  --accent:#1A1F2E;--danger:#D93025;
  --bom-bg:#1A1F2E;--analyzed-color:#52C498;--analyzed-bg:rgba(82,196,152,0.12);--analyzed-border:rgba(82,196,152,0.28);
  --font:'DM Sans','Noto Sans KR',sans-serif;
}
/* 테마 설정 - 버건디 계열 제거 */
[data-theme="navy"]   {--h-bg:#0C1220;--h-border:rgba(255,255,255,0.08);--h-btn:rgba(255,255,255,0.07);--bom-bg:#1A1F2E}
[data-theme="black"]  {--h-bg:#0A0A0A;--h-border:rgba(255,255,255,0.07);--h-btn:rgba(255,255,255,0.06);--bom-bg:#111}
[data-theme="white"]  {--h-bg:#F0F2F6;--h-border:rgba(26,31,46,0.1);--h-btn:rgba(26,31,46,0.06);--bom-bg:#1A1F2E}
[data-theme="gray"]   {--h-bg:#3A3F4C;--h-border:rgba(255,255,255,0.1);--h-btn:rgba(255,255,255,0.09);--bom-bg:#272B35}
[data-theme="purple"] {--h-bg:#3B1F6E;--h-border:rgba(255,255,255,0.1);--h-btn:rgba(255,255,255,0.09);--bom-bg:#1A0A3A}
[data-theme="amber"]  {--h-bg:#7C3E00;--h-border:rgba(255,255,255,0.1);--h-btn:rgba(255,255,255,0.09);--bom-bg:#4A2400}
[data-theme="sage"]   {--h-bg:#2D4A3C;--h-border:rgba(255,255,255,0.1);--h-btn:rgba(255,255,255,0.09);--bom-bg:#1A2E26}
[data-theme="blue"]   {--h-bg:#0D3B5E;--h-border:rgba(255,255,255,0.1);--h-btn:rgba(255,255,255,0.09);--bom-bg:#061E35}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--bg);height:100dvh;display:flex;flex-direction:column;overflow:hidden;color:var(--ink);-webkit-font-smoothing:antialiased}

/* ── HEADER ── */
.header{background:var(--h-bg);height:56px;padding:0 16px;display:flex;align-items:center;flex-shrink:0;position:relative;z-index:100}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--h-border)}
.brand{display:flex;align-items:center;gap:7px;width:82px;flex-shrink:0}
.brand img{width:20px;height:20px;object-fit:contain}
.brand-name{font-size:11px;font-weight:700;letter-spacing:0.03em;color:#fff}
.brand-sep{opacity:0.3}
.header-mid{flex:1;display:flex;align-items:center;justify-content:center}
.drawer-name-btn{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:9px;background:transparent;border:none;cursor:pointer;font-family:var(--font)}
.drawer-name-txt{font-size:13.5px;font-weight:600;color:#fff;letter-spacing:-0.01em}
.drawer-name-chip{font-size:7px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.3);border:1px solid rgba(255,255,255,0.14);padding:1.5px 5px;border-radius:3px}
.header-right{width:82px;display:flex;justify-content:flex-end}
.hdr-sq{width:30px;height:30px;border-radius:7px;background:var(--h-btn);border:1px solid var(--h-border);display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:300}

/* ── MEDIA ── */
.media-section{background:var(--h-bg);padding:0 14px 13px;flex-shrink:0}
.media-box{height:150px;border-radius:12px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer}
.media-box.empty{border:1px dashed var(--h-border);background:rgba(255,255,255,0.03)}
.media-box.filled{border:1px solid rgba(255,255,255,0.06)}
.media-empty-inner{display:flex;flex-direction:column;align-items:center;gap:9px}
.media-empty-sq{width:46px;height:46px;border-radius:11px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center}
.media-empty-sq svg{width:22px;height:22px;stroke:rgba(255,255,255,0.4);stroke-width:1.5;fill:none}
.media-empty-lbl{font-size:11px;font-weight:500;color:rgba(255,255,255,0.4)}
.media-empty-sub{font-size:9.5px;color:rgba(255,255,255,0.2);text-align:center;line-height:1.4}
.analyzed-badge{position:absolute;bottom:9px;right:10px;font-size:8px;font-weight:700;padding:3.5px 10px;border-radius:20px;background:var(--analyzed-bg);color:var(--analyzed-color);border:1px solid var(--analyzed-border)}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;padding:10px 15px 7px;flex-shrink:0;background:var(--bg);gap:8px}
.toolbar-cnt{font-size:9px;font-weight:800;padding:3px 9px;border-radius:20px;background:var(--h-bg);color:#fff}
.toolbar-spacer{flex:1}
.toolbar-search-btn{width:32px;height:32px;border-radius:8px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.toolbar-toggle{font-size:8.5px;font-weight:600;color:var(--muted);padding:4px 10px;background:var(--surface);border:1px solid var(--border);border-radius:6px}

/* ── SEARCH BAR ── */
.search-bar{display:none;align-items:center;gap:8px;padding:8px 14px 9px;background:var(--surface);border-bottom:1px solid var(--border)}
.search-bar.open{display:flex}
.search-wrap{flex:1;display:flex;align-items:center;gap:7px;background:var(--bg);border-radius:9px;padding:8px 12px;border:1px solid var(--border)}
.search-input{flex:1;border:none;outline:none;font-size:12.5px;background:transparent}

/* ── LIST ── */
.list-container{flex:1;overflow-y:auto}
.list-inner{padding:2px 12px 32px}
.cat-header{display:flex;align-items:center;padding:8px 3px 7px}
.cat-name-lbl{font-size:8px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted2);flex:1}

/* ── ITEM CARD ── */
.item-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:8px}
.item-row{display:flex;align-items:center;padding:14px 14px;gap:12px}
.item-ico{width:40px;height:40px;border-radius:10px;background:#F1F2F5;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px}
.item-name{font-size:13px;font-weight:600;color:var(--ink)}
.qty-wrap{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:9px;overflow:hidden}
.qty-btn{width:30px;height:30px;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.qty-num{font-size:12px;font-weight:700;width:26px;text-align:center}

/* ── BOTTOM SECTION ── */
.bottom-section{padding:10px 0 8px;display:flex;flex-direction:column;gap:9px}
.add-row{display:flex;align-items:center;gap:9px;padding:12px 14px;background:rgba(255,255,255,0.65);border:1px solid var(--border);border-radius:12px}
.add-sq{width:22px;height:22px;border-radius:5px;background:#ECEEF4;display:flex;align-items:center;justify-content:center}
.add-lbl{font-size:12px;font-weight:600;color:#6E7A8E}

/* ── 봄 버튼: 네이비 통일 및 Sparkles 적용 ── */
.bom-btn{display:flex;align-items:center;height:50px;padding:0 15px;background:var(--bom-bg);border-radius:13px;gap:11px;position:relative;overflow:hidden}
.bom-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:rgba(255,255,255,0.07)}
.bom-ico{width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center}
.bom-ico svg{width:14px;height:14px;stroke:rgba(255,255,255,0.75);stroke-width:1.7;fill:none}
.bom-txt{flex:1}
.bom-title{font-size:11.5px;font-weight:600;color:rgba(255,255,255,0.9)}
.bom-sub{font-size:9px;color:rgba(255,255,255,0.3)}
.reset-link{text-align:center;font-size:9.5px;color:var(--muted2);text-decoration:underline;padding:3px}

/* ── CHAT SHEET ── */
.chat-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:400;backdrop-filter:blur(5px);align-items:flex-end}
.chat-ov.open{display:flex}
.chat-sheet{background:var(--surface);border-radius:22px 22px 0 0;width:100%;height:72dvh;display:flex;flex-direction:column;overflow:hidden}
.chat-hdr{height:54px;background:var(--h-bg);padding:0 16px;display:flex;align-items:center;gap:10px}
.chat-hdr-logo{width:20px;height:20px;object-fit:contain}
.chat-hdr-sparkle svg{width:18px;height:18px;stroke:rgba(255,255,255,0.85);stroke-width:1.8;fill:none}
.chat-hdr-name{font-size:14px;font-weight:700;color:#fff;flex:1}
.chat-close{width:28px;height:28px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:7px;display:flex;align-items:center;justify-content:center}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:#F4F6FA}
.msg{max-width:78%;padding:10px 13px;border-radius:14px;font-size:12px;line-height:1.6}
.msg.bot{background:var(--surface);border:1px solid var(--border);border-radius:4px 14px 14px 14px;align-self:flex-start}
.msg.user{background:var(--ink);color:#fff;border-radius:14px 14px 4px 14px;align-self:flex-end}
.chat-inp-row{height:52px;padding:0 12px;display:flex;align-items:center;gap:8px;border-top:1px solid var(--border);background:var(--surface)}
.chat-inp-wrap{flex:1;background:var(--bg);border-radius:10px;padding:0 13px;height:34px;display:flex;align-items:center}
.chat-send{width:34px;height:34px;background:var(--ink);border-radius:9px;display:flex;align-items:center;justify-content:center}

/* 공통 오버레이 등 기타 스타일 유지 */
.ov-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.48);z-index:200;backdrop-filter:blur(5px);align-items:flex-end}
.ov-backdrop.open{display:flex}
.sheet{background:var(--surface);border-radius:22px 22px 0 0;width:100%;padding:0 18px 44px}
.sh-handle{width:32px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 18px}
.theme-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px}
.theme-sw{width:46px;height:46px;border-radius:12px;border:2px solid transparent}
.theme-sw.active{box-shadow:0 0 0 3px var(--ink)}
</style>
</head>

<script>
// 기존 Supabase 및 비즈니스 로직 유지
const _supa = supabase.createClient('https://tqhtggusphhcsygiitrv.supabase.co', 'sb_publishable_lJeKpO0aRv9mTBE1qnbkow_JqTmhnHQ');
const params = new URLSearchParams(location.search);
const tag = (params.get('tag') || 'DRAWER001').toUpperCase();
let items = JSON.parse(localStorage.getItem('gyeol_'+tag) || '[]');
// ... (이후 렌더링 및 기능 스크립트는 기존과 동일하게 유지됩니다)

function renderItems(filter='') {
  const container = document.getElementById('list-items');
  const groups = {};
  items.forEach((it, idx) => {
    const f = filter.toLowerCase();
    let cat = '기타', name = it.n;
    if (it.n.includes(':')) { const p=it.n.split(':'); cat=p[0].trim()||'기타'; name=p.slice(1).join(':').trim()||p[0]; }
    if (f && !name.toLowerCase().includes(f) && !cat.toLowerCase().includes(f)) return;
    if (!groups[cat]) groups[cat]=[];
    groups[cat].push({name, qty:it.q||1, idx, icon:it.icon||null});
  });
  const total = items.length;
  document.getElementById('toolbar-cnt').textContent = total;
  document.getElementById('bottom-section').style.display = total>0 ? 'flex' : 'none';
  if (!Object.keys(groups).length) {
    container.innerHTML = `<div style="text-align:center;padding:40px 20px;color:var(--muted2);font-size:12px;line-height:1.8">등록된 물품이 없습니다.<br>사진을 등록하면 AI가 자동으로 인식합니다.</div>`;
    return;
  }
  container.innerHTML = Object.keys(groups).map(cat => `
    <div class="cat-section">
      <div class="cat-header"><span class="cat-name-lbl">${cat}</span></div>
      <div class="cat-content">
        ${groups[cat].map(it => `
          <div class="item-card">
            <div class="item-row">
              <div class="item-ico">${it.icon||'📦'}</div>
              <div class="item-info"><div class="item-name">${it.name}</div><div style="font-size:9px;color:var(--muted2)">${cat}</div></div>
              <div class="qty-wrap">
                <div class="qty-btn" onclick="changeQty(${it.idx},-1)">−</div>
                <span class="qty-num">${it.qty}</span>
                <div class="qty-btn" onclick="changeQty(${it.idx},1)">+</div>
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function openChat() { document.getElementById('chat-ov').classList.add('open'); }
function closeChat() { document.getElementById('chat-ov').classList.remove('open'); }
function changeQty(idx, d) { items[idx].q=Math.max(1,(items[idx].q||1)+d); save(); }
function save() { localStorage.setItem('gyeol_'+tag, JSON.stringify(items)); renderItems(); }
window.onload = () => { renderItems(); };
</script>
