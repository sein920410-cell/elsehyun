<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공간 : 결</title>
    <style>
        /* 사진 2번 스타일: 카테고리 그룹 디자인만 반영 */
        .category-container { border-bottom: 1px solid #e0e0e0; }
        .category-header { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 15px; background: #f8f9fa; cursor: pointer; font-weight: bold;
        }
        .item-row { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; border-top: 1px solid #f0f0f0;
        }
        .arrow { font-size: 0.8rem; transition: transform 0.2s; }
        .open .arrow { transform: rotate(180deg); }

        /* 기존 UI 유지 */
        #media-view { width: 100%; min-height: 200px; background: #000; display: none; }
        #media-view img, #media-view video { width: 100%; height: auto; display: block; }
        .btn-group button { padding: 4px 8px; font-size: 12px; border: 1px solid #ccc; background: #fff; }
    </style>
</head>
<body>

    <div id="media-view"></div>

    <div style="padding: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid #eee;">
        <button onclick="toggleAll()">전체 펼치기/접기</button>
        <button onclick="fullReset()" style="color: red; font-weight: bold;">전체 초기화</button>
    </div>

    <div id="list-area"></div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('inventory')) || [];
        let opened = new Set(); 

        // 1. 전체 초기화 (사진+목록 완전 삭제)
        function fullReset() {
            if (confirm("모든 데이터와 사진을 삭제하시겠습니까?")) {
                inventory = [];
                localStorage.removeItem('inventory');
                localStorage.removeItem('lastUploadedMedia'); // 저장된 사진 경로 삭제
                
                const mediaView = document.getElementById('media-view');
                mediaView.innerHTML = '';
                mediaView.style.display = 'none';
                
                render();
            }
        }

        // 2. 리스트 렌더링 (사진 2번 카테고리 방식)
        function render() {
            const area = document.getElementById('list-area');
            area.innerHTML = '';

            if (inventory.length === 0) {
                area.innerHTML = '<p style="text-align:center; padding:20px; color:#999;">내용이 없습니다.</p>';
                return;
            }

            // 카테고리 그룹화
            const groups = inventory.reduce((acc, item) => {
                const cat = item.category || "미분류";
                if (!acc[cat]) acc[cat] = [];
                acc[cat].push(item);
                return acc;
            }, {});

            for (const cat in groups) {
                const isOpen = opened.has(cat);
                const groupDiv = document.createElement('div');
                groupDiv.className = `category-container ${isOpen ? 'open' : ''}`;
                
                groupDiv.innerHTML = `
                    <div class="category-header" onclick="toggleCat('${cat}')">
                        <span>${cat} (${groups[cat].length})</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div style="display: ${isOpen ? 'block' : 'none'}">
                        ${groups[cat].map(item => `
                            <div class="item-row">
                                <div>
                                    <div style="font-size: 16px;">${item.name}</div>
                                    <div class="btn-group" style="margin-top: 5px;">
                                        <button onclick="editItem('${item.id}')">편집</button>
                                        <button onclick="removeItem('${item.id}')" style="color:red;">삭제</button>
                                    </div>
                                </div>
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <button onclick="qty('${item.id}', -1)" style="width:30px; height:30px;">-</button>
                                    <span style="min-width:20px; text-align:center;">${item.quantity}</span>
                                    <button onclick="qty('${item.id}', 1)" style="width:30px; height:30px;">+</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                area.appendChild(groupDiv);
            }
        }

        function toggleCat(cat) {
            if (opened.has(cat)) opened.delete(cat);
            else opened.add(cat);
            render();
        }

        function toggleAll() {
            const cats = [...new Set(inventory.map(i => i.category || "미분류"))];
            if (opened.size > 0) opened.clear();
            else cats.forEach(c => opened.add(c));
            render();
        }

        // 기존 수량/삭제 로직 유지
        function qty(id, n) {
            const item = inventory.find(i => i.id === id);
            if (item) {
                item.quantity = Math.max(1, item.quantity + n);
                save();
            }
        }
        function removeItem(id) {
            inventory = inventory.filter(i => i.id !== id);
            save();
        }
        function save() {
            localStorage.setItem('inventory', JSON.stringify(inventory));
            render();
        }

        render();
    </script>
</body>
</html>
