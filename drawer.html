<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>공간:결</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ══════════════════════════════════════
   DESIGN SYSTEM
══════════════════════════════════════ */
:root {
  /* Core Palette */
  --bg:            #EEF1F7;
  --surface:       #FFFFFF;
  --surface-2:     #F5F7FA;
  --surface-3:     #EEF1F7;

  /* Text */
  --ink:           #0D1321;
  --ink-2:         #1C2B47;
  --ink-3:         #2E3F5C;
  --muted:         #6275A0;
  --muted-2:       #9AACC8;

  /* Borders */
  --border:        #DDE3F0;
  --border-2:      #C8D1E8;

  /* Brand */
  --accent:        #1A56F0;
  --accent-hover:  #1444CC;
  --accent-light:  #EEF3FF;
  --accent-mid:    #C7D8FF;

  /* Status */
  --danger:        #E02B2B;
  --danger-light:  #FFF1F1;
  --success:       #0F9D58;
  --success-light: #EDFBF3;
  --warning:       #C97A00;
  --warning-light: #FFF8E6;

  /* Category Colors */
  --cat-clothing:  #2563EB;
  --cat-hygiene:   #0891B2;
  --cat-cleaning:  #D97706;
  --cat-care:      #DB2777;
  --cat-living:    #7C3AED;
  --cat-other:     #6275A0;

  /* Shadows */
  --shadow-xs:  0 1px 2px rgba(13,19,33,0.06);
  --shadow-sm:  0 1px 4px rgba(13,19,33,0.08), 0 0 0 1px rgba(13,19,33,0.03);
  --shadow-md:  0 4px 16px rgba(13,19,33,0.1), 0 1px 3px rgba(13,19,33,0.06);
  --shadow-lg:  0 8px 32px rgba(13,19,33,0.14), 0 2px 8px rgba(13,19,33,0.08);

  /* Radii */
  --r-xs: 6px;
  --r-sm: 10px;
  --r-md: 14px;
  --r-lg: 18px;
  --r-xl: 24px;

  /* Font */
  --font: 'DM Sans', 'Noto Sans KR', sans-serif;
}

/* ── Reset ── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}
body {
  font-family: var(--font);
  background: var(--bg);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
.header {
  background: var(--ink);
  height: 60px;
  padding: 0 18px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  position: relative;
  z-index: 100;
}
.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 1px;
  background: rgba(255,255,255,0.07);
}
.header-brand {
  display: flex;
  align-items: center;
  gap: 7px;
  flex-shrink: 0;
  width: 72px;
}
.header-brand-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 2px rgba(26,86,240,0.3);
}
.header-brand-name {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
}
.header-center {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}
.header-title {
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.01em;
  cursor: pointer;
  padding: 6px 12px;
  border-radius: var(--r-sm);
  transition: background 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.header-title:active { background: rgba(255,255,255,0.08); }
.header-title-edit {
  opacity: 0;
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  flex-shrink: 0;
  transition: opacity 0.2s;
}
.header-title:hover .header-title-edit { opacity: 1; }
.header-action {
  width: 72px;
  display: flex;
  justify-content: flex-end;
}
.header-add-btn {
  width: 34px; height: 34px;
  background: rgba(255,255,255,0.1);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 50%;
  color: #fff;
  font-size: 19px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  line-height: 1;
  font-weight: 300;
}
.header-add-btn:active { transform: scale(0.88); background: rgba(255,255,255,0.18); }

/* ══════════════════════════════════════
   MEDIA SECTION
══════════════════════════════════════ */
.media-section {
  background: var(--ink);
  padding: 0 16px 14px;
  flex-shrink: 0;
}
.media-box {
  width: 100%;
  height: 200px;
  background: rgba(255,255,255,0.05);
  border-radius: var(--r-md);
  position: relative;
  display: flex; align-items: center; justify-content: center;
  border: 1.5px dashed rgba(255,255,255,0.12);
  overflow: hidden;
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
  transition: border-color 0.2s;
}
.media-box.has-media {
  border-style: solid;
  border-color: rgba(255,255,255,0.08);
}
.media-box img, .media-box video {
  width: 100%; height: 100%;
  object-fit: cover;
  pointer-events: none;
  position: relative;
  z-index: 2;
  transition: transform 0.3s ease;
}
.media-empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  pointer-events: none;
}
.media-empty-icon {
  width: 52px; height: 52px;
  background: rgba(26,86,240,0.18);
  border: 1.5px solid rgba(26,86,240,0.3);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.media-empty-label {
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.02em;
}
.media-empty-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  margin-top: -4px;
}
.media-delete-btn {
  position: absolute; right: 0; top: 0;
  width: 84px; height: 100%;
  background: var(--danger);
  color: #fff;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 5px;
  font-weight: 700;
  font-size: 11px;
  letter-spacing: 0.06em;
  z-index: 3;
  border-radius: 0 var(--r-md) var(--r-md) 0;
  cursor: pointer;
}

/* ══════════════════════════════════════
   LIST TOOLBAR
══════════════════════════════════════ */
.list-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 10px;
  flex-shrink: 0;
}
.list-label {
  display: flex;
  align-items: center;
  gap: 7px;
}
.list-label-text {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.list-count-badge {
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 20px;
  letter-spacing: 0.02em;
  display: none;
}
.list-count-badge.visible { display: inline-block; }
.toggle-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 11px;
  border-radius: var(--r-xs);
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.12s;
  box-shadow: var(--shadow-xs);
}
.toggle-btn:active { background: var(--surface-3); }

/* ══════════════════════════════════════
   LIST CONTAINER
══════════════════════════════════════ */
.list-container {
  flex: 1;
  overflow-y: auto;
  padding: 0 14px 24px;
  -webkit-overflow-scrolling: touch;
}
.list-container::-webkit-scrollbar { display: none; }

/* ══════════════════════════════════════
   CATEGORY SECTION
══════════════════════════════════════ */
.category-section { margin-bottom: 18px; }
.category-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 4px 8px;
  cursor: pointer;
}
.cat-pip {
  width: 10px; height: 10px;
  border-radius: 3px;
  flex-shrink: 0;
}
.cat-name {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  color: var(--muted);
  flex: 1;
}
.cat-count {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted-2);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 1px 7px;
  border-radius: 20px;
  box-shadow: var(--shadow-xs);
}

/* ══════════════════════════════════════
   ITEM CARD — SWIPE DELETE
══════════════════════════════════════ */
.item-card {
  border-radius: var(--r-md);
  margin-bottom: 7px;
  position: relative;
  overflow: hidden;
  /* Touch action on card level */
  touch-action: pan-y;
}

/* Delete button behind the content */
.item-swipe-delete {
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 84px;
  background: var(--danger);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  z-index: 1;
  cursor: pointer;
  border-radius: var(--r-md);
}
.item-swipe-delete-icon {
  width: 28px; height: 28px;
  background: rgba(255,255,255,0.15);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.item-swipe-delete-label {
  font-size: 10px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* Sliding content on top */
.item-slide-content {
  position: relative;
  z-index: 2;
  background: var(--surface);
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  transform: translateX(0);
  transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  will-change: transform;
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}

/* Category left-bar accent */
.item-slide-content::before {
  content: '';
  position: absolute;
  left: 0; top: 8px; bottom: 8px;
  width: 3px;
  border-radius: 0 2px 2px 0;
  background: var(--cat-color, var(--accent));
}

/* Item row */
.item-row {
  padding: 12px 14px 12px 18px;
  display: flex;
  align-items: center;
  gap: 11px;
}
.item-icon {
  width: 36px; height: 36px;
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
  background: var(--cat-bg, var(--accent-light));
}
.item-info {
  flex: 1;
  min-width: 0;
}
.item-name {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -0.01em;
  line-height: 1.3;
}
.item-meta {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 2px;
}
.item-cat-tag {
  font-size: 10px;
  font-weight: 600;
  color: var(--cat-color, var(--muted));
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* Qty stepper */
.qty-wrap {
  display: flex;
  align-items: center;
  gap: 0;
  flex-shrink: 0;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  overflow: hidden;
}
.qty-btn {
  width: 30px; height: 30px;
  border: none;
  background: none;
  font-size: 16px;
  font-weight: 400;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--ink-3);
  transition: background 0.1s;
  flex-shrink: 0;
}
.qty-btn:active { background: var(--border); }
.qty-num {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  min-width: 24px;
  text-align: center;
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  line-height: 30px;
  height: 30px;
  font-variant-numeric: tabular-nums;
}

/* Action bar */
.item-actions {
  display: flex;
  border-top: 1px solid var(--border);
  background: var(--surface-2);
}
.action-btn {
  flex: 1;
  background: none;
  border: none;
  padding: 7px 0;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  letter-spacing: 0.03em;
  text-transform: uppercase;
  transition: background 0.1s, color 0.1s;
  font-family: var(--font);
}
.action-btn:active { background: var(--surface-3); }
.action-btn.danger { color: var(--danger); }
.action-btn + .action-btn { border-left: 1px solid var(--border); }

/* Low confidence */
.item-low-confidence .item-slide-content {
  border-color: #FBBF24;
  background: #FFFBEB;
}
.item-low-confidence .item-name { color: var(--warning); }
.item-low-confidence .item-cat-tag::after { content: ' · 확인필요'; color: var(--warning); }

/* ══════════════════════════════════════
   BOTTOM SECTION
══════════════════════════════════════ */
.bottom-section {
  padding: 10px 0 4px;
  display: flex;
  flex-direction: column;
  gap: 9px;
}
.add-item-row {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1.5px dashed var(--border-2);
  border-radius: var(--r-md);
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: var(--shadow-xs);
}
.add-item-row:active { background: var(--accent-light); border-color: var(--accent); }
.add-item-icon {
  width: 28px; height: 28px;
  background: var(--accent-light);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--accent);
  font-size: 17px;
  font-weight: 300;
  flex-shrink: 0;
}
.add-item-label { font-size: 13px; font-weight: 600; color: var(--accent); }

.chat-entry {
  display: flex; align-items: center;
  padding: 14px 18px;
  background: var(--ink);
  border-radius: var(--r-md);
  gap: 12px;
  cursor: pointer;
  transition: background 0.15s;
  box-shadow: var(--shadow-sm);
}
.chat-entry:active { background: var(--ink-2); }
.chat-entry-icon { font-size: 16px; }
.chat-entry-body { flex: 1; }
.chat-entry-title {
  font-size: 13.5px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.01em;
}
.chat-entry-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  margin-top: 1px;
}
.chat-entry-arrow {
  color: rgba(255,255,255,0.3);
  font-size: 14px;
}
.reset-btn {
  align-self: center;
  background: none; border: none;
  color: var(--muted-2);
  font-size: 11.5px;
  font-weight: 500;
  text-decoration: underline;
  text-underline-offset: 3px;
  cursor: pointer;
  padding: 6px;
  font-family: var(--font);
  letter-spacing: 0.01em;
}

/* ══════════════════════════════════════
   EMPTY STATE
══════════════════════════════════════ */
.empty-list {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 52px 20px;
  color: var(--muted-2);
}
.empty-list-icon { font-size: 40px; opacity: 0.4; }
.empty-list-text { font-size: 13px; font-weight: 500; text-align: center; line-height: 1.7; }

/* ══════════════════════════════════════
   OVERLAY (공통)
══════════════════════════════════════ */
.overlay-window {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--surface);
  z-index: 10000;
  flex-direction: column;
}
.overlay-header {
  background: var(--ink);
  color: #fff;
  padding: 0 18px;
  height: 60px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.overlay-title { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
.close-btn {
  width: 32px; height: 32px;
  background: rgba(255,255,255,0.1);
  border: none;
  border-radius: 50%;
  color: #fff;
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background 0.12s;
}
.close-btn:active { background: rgba(255,255,255,0.2); }

/* ══════════════════════════════════════
   CHAT OVERLAY
══════════════════════════════════════ */
.chat-messages {
  flex: 1;
  padding: 20px 16px;
  overflow-y: auto;
  display: flex; flex-direction: column;
  gap: 10px;
  background: var(--bg);
}
.msg {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 14px;
  line-height: 1.5;
}
.msg.user {
  align-self: flex-end;
  background: var(--ink);
  color: #fff;
  border-radius: 16px 16px 4px 16px;
}
.msg.bot {
  align-self: flex-start;
  background: var(--surface);
  color: var(--ink);
  border: 1px solid var(--border);
  border-radius: 16px 16px 16px 4px;
  box-shadow: var(--shadow-xs);
}
.chat-input-row {
  padding: 12px 14px;
  display: flex; gap: 9px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}
.chat-input {
  flex: 1;
  padding: 10px 14px;
  border: 1.5px solid var(--border-2);
  border-radius: var(--r-md);
  font-size: 14px;
  font-family: var(--font);
  color: var(--ink);
  background: var(--surface-2);
  outline: none;
  transition: border-color 0.15s;
}
.chat-input:focus { border-color: var(--accent); }
.chat-send-btn {
  width: 42px; height: 42px;
  background: var(--ink);
  border: none;
  border-radius: var(--r-md);
  color: #fff;
  font-size: 17px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
}

/* ══════════════════════════════════════
   FULLSCREEN
══════════════════════════════════════ */
#fullscreen-view {
  display: none;
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 20000;
  align-items: center;
  justify-content: center;
}
#fullscreen-view img, #fullscreen-view video {
  max-width: 100%; max-height: 100%;
  object-fit: contain;
}
.rotate90  { transform: rotate(90deg); }
.rotate180 { transform: rotate(180deg); }
.rotate270 { transform: rotate(270deg); }

/* ══════════════════════════════════════
   ROTATE PREVIEW
══════════════════════════════════════ */
#preview-wrap {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  background: #0D1321;
  overflow: hidden;
}
.preview-actions {
  padding: 14px 16px;
  display: flex; gap: 9px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.preview-btn {
  flex: 1; padding: 13px;
  border-radius: var(--r-md);
  border: 1.5px solid var(--border-2);
  background: var(--surface-2);
  font-size: 13.5px;
  font-weight: 600;
  color: var(--ink);
  cursor: pointer;
  font-family: var(--font);
  transition: background 0.12s;
}
.preview-btn.primary {
  flex: 2;
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.preview-btn:active { opacity: 0.8; }

/* ══════════════════════════════════════
   BOTTOM SHEET / PICKER
══════════════════════════════════════ */
.bottom-sheet-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 15000;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(4px);
}
.bottom-sheet-overlay.active { display: flex; }
.bottom-sheet {
  background: var(--surface);
  border-radius: 22px 22px 0 0;
  padding: 0 18px 44px;
  width: 100%;
  animation: sheetUp 0.26s cubic-bezier(0.32, 0, 0, 1);
}
@keyframes sheetUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.sheet-handle {
  width: 36px; height: 4px;
  background: var(--border-2);
  border-radius: 2px;
  margin: 12px auto 20px;
}
.sheet-title {
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  text-align: center;
  margin-bottom: 18px;
  letter-spacing: -0.01em;
}
.sheet-btn {
  width: 100%;
  padding: 14px 16px;
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  background: var(--surface-2);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  text-align: left;
  color: var(--ink);
  display: flex; align-items: center;
  gap: 14px;
  margin-bottom: 9px;
  font-family: var(--font);
  transition: background 0.1s, border-color 0.1s;
  box-shadow: var(--shadow-xs);
}
.sheet-btn:active { background: var(--accent-light); border-color: var(--accent); }
.sheet-btn-icon { font-size: 22px; flex-shrink: 0; }
.sheet-btn-label { font-size: 13.5px; font-weight: 700; }
.sheet-btn-sub { font-size: 11.5px; color: var(--muted-2); margin-top: 2px; font-weight: 400; }
.sheet-cancel {
  width: 100%; padding: 13px;
  border-radius: var(--r-md);
  border: none;
  background: var(--surface-3);
  font-size: 13.5px;
  color: var(--muted);
  cursor: pointer;
  font-weight: 600;
  font-family: var(--font);
  transition: background 0.1s;
}
.sheet-cancel:active { background: var(--border); }

/* ══════════════════════════════════════
   RECORD WINDOW
══════════════════════════════════════ */
#record-window { background: #000; }
.record-header {
  background: rgba(0,0,0,0.85);
  color: #fff;
  padding: 14px 18px;
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0;
}
.record-video-area { flex: 1; background: #000; position: relative; overflow: hidden; }
.record-video-area video { width: 100%; height: 100%; object-fit: cover; display: block; }
.rec-indicator {
  display: none;
  position: absolute; top: 14px; left: 14px;
  background: var(--danger);
  color: #fff;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.06em;
}
.record-controls { background: #0D1321; padding: 18px 18px 40px; flex-shrink: 0; }
.record-timer {
  color: #fff; font-size: 22px; font-weight: 700;
  text-align: center; margin-bottom: 16px;
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.06em;
}
.record-timer.danger { color: var(--danger); }
.record-btn-row {
  display: flex; align-items: center; justify-content: center;
  gap: 22px;
}
.record-circle {
  width: 70px; height: 70px; border-radius: 50%;
  background: var(--danger);
  border: 4px solid rgba(255,255,255,0.25);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
  transition: transform 0.1s;
}
.record-circle:active { transform: scale(0.9); }
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(224,43,43,0.5); }
  50%      { box-shadow: 0 0 0 16px rgba(224,43,43,0); }
}
.record-circle.recording { background: #374151; animation: pulse 1.5s infinite; }
.rec-side-btn {
  padding: 11px 18px; border-radius: var(--r-md);
  border: none; font-size: 13.5px; font-weight: 700;
  cursor: pointer; min-width: 84px; font-family: var(--font);
}
.rec-hint { color: #6275A0; font-size: 12.5px; text-align: center; margin-top: 12px; }

/* ══════════════════════════════════════
   CONFIRM OVERLAY (confidence 검토)
══════════════════════════════════════ */
#confirm-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 30000;
  align-items: flex-end;
  backdrop-filter: blur(4px);
}
#confirm-overlay.active { display: flex; }
.confirm-sheet {
  background: var(--surface);
  border-radius: 22px 22px 0 0;
  width: 100%; max-height: 88vh;
  overflow-y: auto;
  padding: 0 18px 44px;
  animation: sheetUp 0.26s cubic-bezier(0.32,0,0,1);
}
.confirm-title {
  font-size: 16px; font-weight: 700;
  color: var(--ink); margin-bottom: 4px;
}
.confirm-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
.confirm-block {
  background: var(--surface-2);
  border-radius: var(--r-md);
  padding: 14px; margin-bottom: 10px;
  border: 1px solid var(--border);
}
.confirm-q {
  font-size: 11px; font-weight: 700;
  color: var(--muted); letter-spacing: 0.06em;
  text-transform: uppercase; margin-bottom: 10px;
}
.confirm-q span { color: var(--accent); }
.confirm-cand {
  display: block; width: 100%; text-align: left;
  padding: 10px 13px;
  border-radius: var(--r-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  font-size: 13.5px; font-weight: 500;
  color: var(--ink); margin-bottom: 6px;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.12s;
}
.confirm-cand.selected { background: var(--ink); color: #fff; border-color: var(--ink); font-weight: 600; }
.confirm-cand:active { background: var(--accent-light); }
.confirm-skip {
  display: block; width: 100%; text-align: center;
  padding: 7px; border: none; background: none;
  font-size: 12px; color: var(--muted-2);
  cursor: pointer; font-family: var(--font);
}
.confirm-done {
  width: 100%; padding: 14px;
  border-radius: var(--r-md); border: none;
  background: var(--ink); color: #fff;
  font-size: 14.5px; font-weight: 700;
  cursor: pointer; margin-top: 14px;
  font-family: var(--font); transition: background 0.15s;
}
.confirm-done:active { background: var(--ink-2); }

/* ══════════════════════════════════════
   ANALYZING SPINNER
══════════════════════════════════════ */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}
.analyzing-badge {
  display: inline-flex; align-items: center;
  gap: 9px;
  background: rgba(13,19,33,0.85);
  color: #fff;
  padding: 9px 18px;
  border-radius: 24px;
  font-size: 13px; font-weight: 600;
  backdrop-filter: blur(4px);
}

function renderItems(filter = '') {

            return `

              <div class="item-swipe-delete" onclick="deleteItem(${it.originalIdx})">
                <div class="item-swipe-delete-icon">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M3 3L11 11M11 3L3 11" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
                  </svg>
                </div>
                <span class="item-swipe-delete-label">삭제</span>
              </div>
              <div class="item-slide-content" id="slide-${it.originalIdx}" style="--cat-color:${cfg2.color};--cat-bg:${cfg2.bg}">
                <div class="item-row">
                  <div class="item-icon">${cfg2.icon}</div>
                  <div class="item-info">
                    <div class="item-name">${it.name}</div>
                    <div class="item-meta">

                    </div>

                  <div class="qty-wrap">
                    <button class="qty-btn" onclick="changeQty(${it.originalIdx},-1)">−</button>
                    <span class="qty-num">${it.qty}</span>

                  </div>
                </div>
                <div class="item-actions">
                  <button class="action-btn" onclick="editItem(${it.originalIdx})">편집</button>
                  <button class="action-btn danger" onclick="deleteItem(${it.originalIdx})">삭제</button>
                </div>
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>`;

  bindItemSwipeEvents();

/* ══════════════════════════════════════
   SWIPE DELETE — ★ 완전 재설계
   card 전체에 터치 이벤트 부착
   (열린 상태에서도 삭제버튼 영역 터치 처리)
══════════════════════════════════════ */
function bindItemSwipeEvents() {
  document.querySelectorAll('.item-card').forEach(card => {
    const sc = card.querySelector('.item-slide-content');
    if (!sc) return;
    sc._offset = 0;

    let startX = 0, startY = 0, startOffset = 0;
    let active = false, gestureDir = null, isDragging = false;

    card.addEventListener('touchstart', e => {
      // 수량 버튼·액션 버튼·삭제 버튼은 swipe 추적 제외
      if (
        e.target.closest('.qty-btn') ||
        e.target.closest('.action-btn') ||
        e.target.closest('.item-swipe-delete')
      ) return;

      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startOffset = sc._offset;
      active = true;
      isDragging = false;
      gestureDir = null;

      // 다른 카드 닫기
      if (activeSlideCard && activeSlideCard !== card) closeActiveSlide();
    }, { passive: true });

    card.addEventListener('touchmove', e => {
      if (!active) return;
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;

      // 방향 결정 (5px 이후)
      if (!gestureDir) {
        const dist = Math.hypot(dx, dy);
        if (dist < 5) return;
        gestureDir = Math.abs(dx) > Math.abs(dy) * 1.1 ? 'h' : 'v';
      }
      if (gestureDir !== 'h') return;

      e.preventDefault();
      isDragging = true;

      const rawX = startOffset + dx;
      const clamped = Math.max(-84, Math.min(0, rawX));
      sc.style.transition = 'none';
      sc.style.transform = `translateX(${clamped}px)`;
      sc._offset = clamped;

      if (clamped < -8) {
        card.classList.add('slide-open');
        activeSlideCard = card;
      } else {
        card.classList.remove('slide-open');
        if (activeSlideCard === card) activeSlideCard = null;
      }
    }, { passive: false });

    card.addEventListener('touchend', e => {
      if (!active) return;
      active = false;

      sc.style.transition = 'transform 0.25s cubic-bezier(0.4,0,0.2,1)';

      // 드래그가 없었으면 (단순 탭) — 중간 위치면 스냅만
      if (!isDragging) {
        if (sc._offset <= -42) {
          sc.style.transform = 'translateX(-84px)';
          sc._offset = -84;
        } else {
          sc.style.transform = 'translateX(0)';
          sc._offset = 0;
          card.classList.remove('slide-open');
          if (activeSlideCard === card) activeSlideCard = null;
        }
        return;
      }

      // 수평 드래그 — 최종 위치로 스냅
      const dx = e.changedTouches[0].clientX - startX;
      const finalX = startOffset + dx;

      if (finalX < -42) {
        // 열기
        sc.style.transform = 'translateX(-84px)';
        sc._offset = -84;
        card.classList.add('slide-open');
        activeSlideCard = card;
      } else {
        // 닫기
        sc.style.transform = 'translateX(0)';
        sc._offset = 0;
        card.classList.remove('slide-open');
        if (activeSlideCard === card) activeSlideCard = null;
      }
    }, { passive: true });
  });

  // 목록 바깥 터치 → 열린 카드 닫기
  const listEl = document.getElementById('list-items');
  if (listEl) {
    listEl.addEventListener('touchstart', e => {
      if (activeSlideCard && !e.target.closest('.item-card')) closeActiveSlide();
    }, { passive: true });
  }
}

function initMediaEvents() {
  const wrap = document.getElementById('media-wrap');
  let startX = 0, isMoving = false;

  wrap.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    isMoving = false;
  }, { passive: true });

  wrap.addEventListener('touchmove', e => {
    const el = document.getElementById('main-media-el');
    if (!el || !localStorage.getItem('mediaPath_' + tag)) return;
    const diffX = e.touches[0].clientX - startX;
    if (diffX < -10) {
      isMoving = true;
      el.style.transform = `translateX(${Math.max(diffX, -100)}px)`;
      el.style.transition = 'none';
      if (!document.getElementById('media-del-btn')) {
        const btn = document.createElement('div');
        btn.id = 'media-del-btn';
        btn.className = 'media-delete-btn';
        btn.innerHTML = `
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M14 6L6 14M6 6L14 14" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          삭제`;
        btn.addEventListener('touchstart', ev => ev.stopPropagation(), { passive: false });
        btn.addEventListener('touchend', ev => {
          ev.stopPropagation(); ev.preventDefault();
          if (confirm('사진/영상을 삭제할까요?')) deleteMedia();
        }, { passive: false });
        btn.onclick = ev => ev.stopPropagation();
        wrap.appendChild(btn);
      }
    }
  }, { passive: true });

  wrap.addEventListener('touchend', e => {
    if (document.getElementById('media-del-btn')) return;
    const el = document.getElementById('main-media-el');
    if (!el) return;
    el.style.transition = 'transform 0.3s ease';
    if (isMoving) {
      const diffX = e.changedTouches[0].clientX - startX;
      if (diffX < -50) {
        el.style.transform = 'translateX(-84px)';
      } else {
        el.style.transform = 'translateX(0)';
        setTimeout(() => document.getElementById('media-del-btn')?.remove(), 300);
      }
    } else if (localStorage.getItem('mediaPath_' + tag)) {
      openFullscreen();
    }
  });
}

}

  input.capture = 'environment'; input.style.display = 'none';
  document.body.appendChild(input);
  input.onchange = e => { const f = e.target.files[0]; if (!f) return; selectedFile = f; previewForRotate(f); };
  input.click();
}

function previewForRotate(file) {
  const reader = new FileReader();
  reader.onload = re => {
    document.getElementById('preview-wrap').innerHTML =
      `<img id="edit-preview" src="${re.target.result}" style="max-width:100%;max-height:100%;object-fit:contain;">`;
    currentRotation = 0;
    document.getElementById('rotate-window').style.display = 'flex';
  };
  reader.readAsDataURL(file);
}

function rotateMedia(deg) {
  currentRotation = (currentRotation + deg + 360) % 360;
  document.getElementById('edit-preview').className = `rotate${currentRotation}`;
}
function cancelUpload() { document.getElementById('rotate-window').style.display = 'none'; selectedFile = null; }

/* ══════════════════════════════════════
   UPLOAD & ANALYZE
══════════════════════════════════════ */
async function confirmUpload() {
  if (!selectedFile) return;
  items = [];
  localStorage.setItem('gyeol_' + tag, JSON.stringify(items));
  const file = selectedFile; selectedFile = null;
  document.getElementById('rotate-window').style.display = 'none';

  const wrap = document.getElementById('media-wrap');
  wrap.classList.add('has-media');
  wrap.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;background:rgba(13,19,33,0.6)">
      <div class="analyzing-badge"><div class="spinner"></div>AI 분석 중...</div>
    </div>`;

  try {
    const extMatch = (file.name || '').match(/\.([0-9a-zA-Z]+)$/);
    const fileExt = extMatch ? extMatch[1].toLowerCase() : (file.type.split('/')[1] || 'jpg');
    const path = `${tag}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.${fileExt}`;
    const oldPath = localStorage.getItem('mediaPath_' + tag);
    if (oldPath && oldPath !== path) _supa.storage.from('user_uploads').remove([oldPath]).catch(() => {});

    const { error: uploadErr } = await _supa.storage.from('user_uploads').upload(path, file, {
      cacheControl: '3600', upsert: false, contentType: file.type || `image/${fileExt}`
    });
    if (uploadErr) throw uploadErr;

    localStorage.setItem('mediaPath_' + tag, path);
    localStorage.setItem('rot_' + tag, currentRotation);

    const { data: signData, error: urlErr } = await _supa.storage.from('user_uploads').createSignedUrl(path, 3600);
    if (urlErr) throw urlErr;
    showMedia(signData.signedUrl, currentRotation);

    if (file.type.startsWith('image/')) {
      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filePath: path, mimeType: file.type, userCorrections: userCorrections.slice(-20) })
      });
      if (!res.ok) throw new Error(`분석 API 오류: ${res.status}`);
      const { items: autoItems, reviewItems, lowItems } = await res.json();
      if (autoItems?.length > 0) autoItems.forEach(it => items.push({ n: `${it.category}:${it.name}`, q: it.qty || 1 }));
      if (lowItems?.length > 0) lowItems.forEach(it => items.push({ n: `${it.category}:${it.name}`, q: it.qty || 1, low: true }));
      localStorage.setItem('gyeol_' + tag, JSON.stringify(items));
      renderItems();

      if (reviewItems?.length > 0) {
        showConfirmOverlay(reviewItems);
      } else {
        const total = (autoItems?.length || 0) + (lowItems?.length || 0);
        if (total > 0) alert(`✅ ${total}개 물품을 찾았습니다!`);
        else alert('물품을 찾지 못했습니다.\n직접 추가해 주세요.');
      }
    }
  } catch (err) {
    console.error(err);
    wrap.innerHTML = `
      <div class="media-empty-state">
        <div class="media-empty-icon">⚠️</div>
        <div class="media-empty-label">업로드 실패: ${err.message}</div>
      </div>`;
    alert('오류: ' + err.message);
  }
}

/* ══════════════════════════════════════
   CONFIDENCE 확인 UI
══════════════════════════════════════ */
let pendingReviewItems = [], reviewSelections = {};

function showConfirmOverlay(reviewItems) {
  pendingReviewItems = reviewItems;
  reviewSelections = {};
  const listEl = document.getElementById('confirm-item-list');
  listEl.innerHTML = reviewItems.map((it, idx) => {
    const candidates = it.candidates?.length > 0 ? it.candidates : [it.name];
    reviewSelections[idx] = candidates[0];
    return `
      <div class="confirm-block">
        <div class="confirm-q">이 물건이 맞나요? <span>${it.category}</span></div>
        ${candidates.map((c, ci) => `
          <button class="confirm-cand ${ci === 0 ? 'selected' : ''}" id="cand-${idx}-${ci}"
            onclick="selectCandidate(${idx},${ci},'${c.replace(/'/g,"\\'")}',${candidates.length})">
            ${ci === 0 ? '✓ ' : ''}${c}
          </button>`).join('')}
        <button class="confirm-skip" onclick="skipReviewItem(${idx})">건너뛰기</button>
      </div>`;
  }).join('');
  document.getElementById('confirm-overlay').classList.add('active');
}

function selectCandidate(itemIdx, candIdx, name, total) {
  reviewSelections[itemIdx] = name;
  for (let ci = 0; ci < total; ci++) {
    const btn = document.getElementById(`cand-${itemIdx}-${ci}`);
    if (!btn) continue;
    if (ci === candIdx) { btn.classList.add('selected'); btn.textContent = '✓ ' + name; }
    else { btn.classList.remove('selected'); btn.textContent = btn.textContent.replace(/^✓ /, ''); }
  }
}

function skipReviewItem(idx) {
  reviewSelections[idx] = null;
  const block = document.getElementById(`cand-${idx}-0`)?.closest('.confirm-block');
  if (block) block.style.opacity = '0.4';
}

function confirmReviewItems() {
  document.getElementById('confirm-overlay').classList.remove('active');
  let added = 0;
  pendingReviewItems.forEach((it, idx) => {
    const name = reviewSelections[idx];
    if (!name) return;
    items.push({ n: `${it.category}:${name}`, q: it.qty || 1 });
    added++;
  });
  if (added > 0) { localStorage.setItem('gyeol_' + tag, JSON.stringify(items)); renderItems(); }
  if (items.length > 0) alert(`✅ 총 ${items.length}개 물품이 등록되었습니다!`);
  else alert('물품을 찾지 못했습니다.\n직접 추가해 주세요.');
}

/* ══════════════════════════════════════
   영상 촬영
══════════════════════════════════════ */
async function startVideoRecord() {
  document.getElementById('picker-overlay').classList.remove('active');
  if (!navigator.mediaDevices?.getUserMedia) {
    alert('이 브라우저에서는 영상 촬영이 지원되지 않습니다.'); return;
  }
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: { ideal: 'environment' } },
      audio: false
    });
    const liveEl = document.getElementById('record-live');
    liveEl.srcObject = mediaStream; liveEl.style.display = 'block';
    document.getElementById('record-playback').style.display = 'none';
    document.getElementById('record-timer').textContent = '00:00 / 00:30';
    document.getElementById('record-timer').className = 'record-timer';
    document.getElementById('record-btn').className = 'record-circle';
    document.getElementById('record-btn').innerHTML = '⏺';
    document.getElementById('record-btn').style.display = 'flex';
    document.getElementById('confirm-rec-btn').style.display = 'none';
    document.getElementById('retake-rec-btn').style.display = 'none';
    document.getElementById('rec-indicator').style.display = 'none';
    document.getElementById('rec-hint').textContent = '⏺ 버튼을 눌러 촬영을 시작하세요';
    recordedBlob = null; isRecording = false;
    document.getElementById('record-window').style.display = 'flex';
  } catch (err) { alert('카메라 접근 실패: ' + err.message); }
}

function toggleRecording() {
  if (!isRecording) {
    recordedChunks = [];
    const mt = ['video/webm;codecs=vp9','video/webm','video/mp4'].find(t => MediaRecorder.isTypeSupported(t)) || '';
    mediaRecorder = new MediaRecorder(mediaStream, mt ? { mimeType: mt } : {});
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const type = (mt || 'video/webm').split(';')[0];
      recordedBlob = new Blob(recordedChunks, { type });
      const pb = document.getElementById('record-playback');
      pb.src = URL.createObjectURL(recordedBlob);
      pb.style.display = 'block';
      document.getElementById('record-live').style.display = 'none';
      document.getElementById('rec-indicator').style.display = 'none';
      document.getElementById('record-btn').style.display = 'none';
      document.getElementById('confirm-rec-btn').style.display = 'inline-flex';
      document.getElementById('retake-rec-btn').style.display = 'inline-flex';
      document.getElementById('rec-hint').textContent = '영상을 확인하고 등록하거나 다시 촬영하세요.';
      isRecording = false;
    };
    mediaRecorder.start(); isRecording = true; recordSeconds = 0;
    document.getElementById('record-btn').className = 'record-circle recording';
    document.getElementById('record-btn').innerHTML = '⏹';
    document.getElementById('rec-indicator').style.display = 'block';
    document.getElementById('rec-hint').textContent = '촬영 중... (최대 30초)';
    recordTimer = setInterval(() => {
      recordSeconds++;
      const s = String(recordSeconds).padStart(2,'0');
      document.getElementById('record-timer').textContent = `00:${s} / 00:30`;
      if (recordSeconds >= 25) document.getElementById('record-timer').className = 'record-timer danger';
      if (recordSeconds >= 30) stopRecording();
    }, 1000);
  } else { stopRecording(); }
}

function stopRecording() {
  clearInterval(recordTimer);
  if (mediaRecorder?.state !== 'inactive') mediaRecorder.stop();
}

function retakeRecording() {
  recordedBlob = null; recordedChunks = [];
  document.getElementById('record-live').style.display = 'block';
  document.getElementById('record-playback').style.display = 'none';
  document.getElementById('confirm-rec-btn').style.display = 'none';
  document.getElementById('retake-rec-btn').style.display = 'none';
  document.getElementById('record-btn').style.display = 'flex';
  document.getElementById('record-btn').className = 'record-circle';
  document.getElementById('record-btn').innerHTML = '⏺';
  document.getElementById('record-timer').textContent = '00:00 / 00:30';
  document.getElementById('record-timer').className = 'record-timer';
  document.getElementById('rec-hint').textContent = '⏺ 버튼을 눌러 촬영을 시작하세요';
  isRecording = false;
}

async function confirmRecording() {
  if (!recordedBlob) return;
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  document.getElementById('record-window').style.display = 'none';
  items = []; localStorage.setItem('gyeol_' + tag, JSON.stringify(items));
  const wrap = document.getElementById('media-wrap');
  wrap.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;width:100%;height:100%"><div class="analyzing-badge"><div class="spinner"></div>업로드 중...</div></div>`;
  try {
    const ext = recordedBlob.type.includes('mp4') ? 'mp4' : 'webm';
    const path = `${tag}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
    const file = new File([recordedBlob], `record.${ext}`, { type: recordedBlob.type });
    const oldPath = localStorage.getItem('mediaPath_' + tag);
    if (oldPath) _supa.storage.from('user_uploads').remove([oldPath]).catch(() => {});
    const { error } = await _supa.storage.from('user_uploads').upload(path, file, {
      cacheControl: '3600', upsert: false, contentType: recordedBlob.type
    });
    if (error) throw error;
    localStorage.setItem('mediaPath_' + tag, path);
    localStorage.setItem('rot_' + tag, 0);
    const { data: sd, error: ue } = await _supa.storage.from('user_uploads').createSignedUrl(path, 3600);
    if (ue) throw ue;
    showMedia(sd.signedUrl, 0);
    renderItems();
    alert('✅ 영상이 등록되었습니다.\n(AI 분석은 사진만 지원됩니다.)');
  } catch (err) {
    wrap.innerHTML = `<div class="media-empty-state"><div class="media-empty-icon">⚠️</div><div class="media-empty-label">업로드 실패</div></div>`;
    alert('오류: ' + err.message);
  }
}

function cancelRecording() {
  clearInterval(recordTimer);
  if (mediaRecorder?.state !== 'inactive') mediaRecorder?.stop();
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  document.getElementById('record-window').style.display = 'none';
  isRecording = false;
}

/* ══════════════════════════════════════
   FULLSCREEN
══════════════════════════════════════ */
function openFullscreen() {
  const el = document.getElementById('main-media-el'); if (!el) return;
  const fs = document.getElementById('fs-content');
  fs.innerHTML = el.tagName === 'VIDEO'
    ? `<video src="${el.src}" class="${el.className}" controls autoplay></video>`
    : `<img src="${el.src}" class="${el.className}">`;
  document.getElementById('fullscreen-view').style.display = 'flex';
}
function closeFullscreen() { document.getElementById('fullscreen-view').style.display = 'none'; }

function toggleOverlay(id) {
  const el = document.getElementById(id);
  el.style.display = window.getComputedStyle(el).display === 'none' ? 'flex' : 'none';
}

/* ══════════════════════════════════════
   CHAT
══════════════════════════════════════ */
async function sendMsg() {
  const inp = document.getElementById('chat-input');
  const t = inp.value.trim(); if (!t) return;
  const b = document.getElementById('chat-messages');
  b.innerHTML += `<div class="msg user">${t}</div>`;
  inp.value = '';
  b.scrollTop = b.scrollHeight;
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: t, tag,
        drawerName: document.getElementById('drawer-title-text').textContent,
        inventory: JSON.stringify(items.map(it => it.n))
      })
    });
    const d = await res.json();
    b.innerHTML += `<div class="msg bot">${d.reply}</div>`;
    b.scrollTop = b.scrollHeight;
  } catch { b.innerHTML += `<div class="msg bot">오류가 발생했습니다.</div>`; }
}
</script>
