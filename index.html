<style>body { visibility: hidden; }</style>
<script>
  (function(){ try{ if(localStorage.getItem('gyeol_theme')==='dark'){ document.documentElement.setAttribute('data-theme','dark'); } }catch(e){} })();
  window.addEventListener('pageshow', function(){ try{ if(localStorage.getItem('gyeol_theme')==='dark'){ document.documentElement.setAttribute('data-theme','dark'); } else { document.documentElement.removeAttribute('data-theme'); } }catch(e){} });
  document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='visible'){ try{ if(localStorage.getItem('gyeol_theme')==='dark'){ document.documentElement.setAttribute('data-theme','dark'); } else { document.documentElement.removeAttribute('data-theme'); } }catch(e){} } });
</script>
<script>
(async () => {
    const _authClient = supabase.createClient(
        'https://tqhtggusphhcsygiitrv.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxaHRnZ3VzcGhoY3N5Z2lpdHJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwNDMxMTMsImV4cCI6MjA4NjYxOTExM30.HXA2GbucJPkt3LFl9_JpLiwUQvI95QNEDeQWzQ9i-pc'
    );
    const { data: { session } } = await _authClient.auth.getSession();
    if (!session) { window.location.replace('login.html'); return; }
    window._searchSb = _authClient;  // 검색 결과 썸네일 signedUrl 생성에 재사용
    const { data: serial } = await _authClient
        .from('serials')
        .select('id')
        .eq('used_by', session.user.email)
        .maybeSingle();
    if (!serial) { window.location.replace('serial.html'); return; }
    // 인증 통과 → 화면 표시
    document.body.style.visibility = 'visible';
    checkSystemAnnouncement();
    // drawers 테이블에서 이 사용자의 모든 수납장을 localStorage로 복원 (방문기록 지워도 유지)
    try {
        const { data: rows } = await _authClient
            .from('drawers')
            .select('tag,name,items,media_path,media_rot,color_theme,corrections')
            .eq('user_email', session.user.email);
        if (rows && rows.length) {
            rows.forEach(function(d){
                if(!d.tag)return;
                try{
                    localStorage.setItem('gyeol_'+d.tag, JSON.stringify(Array.isArray(d.items)?d.items:[]));
                    if(d.name) localStorage.setItem('name_'+d.tag, d.name);
                    if(d.media_path){ localStorage.setItem('mediaPath_'+d.tag, d.media_path); localStorage.setItem('rot_'+d.tag, d.media_rot||0); }
                    if(d.color_theme) localStorage.setItem('gyeol_color_theme_'+d.tag, d.color_theme);
                    if(Array.isArray(d.corrections)) localStorage.setItem('corrections_'+d.tag, JSON.stringify(d.corrections));
                }catch(e){}
            });
        }
    } catch(e) { console.warn('수납장 복원 오류', e); }
    // 온보딩 자동 실행
    setTimeout(function(){ startOnboarding(); }, 1000);
        })();
</script>

<script>
function getAllDrawers() {
  const drawers = [];
  const SETTING_KEYS = ['gyeol_theme','gyeol_size','gyeol_lang'];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key || !key.startsWith('gyeol_')) continue;
    if (SETTING_KEYS.indexOf(key) !== -1) continue;
    const tag = key.replace('gyeol_', '');
    if (!/^GYEOL-/i.test(tag)) continue;
    const raw = localStorage.getItem(key);
    let items = [];
    try { items = JSON.parse(raw) || []; } catch(e) {}
    if (!Array.isArray(items)) continue;
    const name = localStorage.getItem('name_' + tag) || formatTag(tag);
    const mediaPath = localStorage.getItem('mediaPath_' + tag) || null;
    drawers.push({ tag, name, items, mediaPath });
  }
  return drawers;
}

function formatTag(tag) {
  // 신규 시리얼: GYEOL-1-DR1 → 서랍 1, GYEOL-1-MAIN → 메인
  const mNew = tag.match(/GYEOL-(\d+)-(DR(\d+)|MAIN)/i);
  if (mNew) {
    if (mNew[2].toUpperCase() === 'MAIN') return '메인';
    return '서랍 ' + mNew[3];
  }
  const m = tag.match(/DRAWER0*(\d+)/i);
  if (m) return '서랍 ' + parseInt(m[1]);
  return tag;
}

function highlight(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx)
    + '<mark>' + text.slice(idx, idx + query.length) + '</mark>'
    + text.slice(idx + query.length);
}

function onSearch() {
  const query = document.getElementById('search-input').value.trim();
  const clearBtn = document.getElementById('clear-btn');
  const heroText = document.getElementById('hero-text');
  const searchHint = document.getElementById('search-hint');
  const resultArea = document.getElementById('result-area');
  const resultLabel = document.getElementById('result-label');
  const resultList = document.getElementById('result-list');

  clearBtn.classList.toggle('vis', query.length > 0);

  if (!query) {
    heroText.style.display = '';
    if (searchHint) searchHint.style.display = '';
    resultArea.style.display = 'none';
    resultList.innerHTML = '';
    return;
  }

  heroText.style.display = 'none';
  if (searchHint) searchHint.style.display = 'none';
  resultArea.style.display = 'block';

  const drawers = getAllDrawers();
  const results = [];
  drawers.forEach(d => {
    d.items.forEach(it => {
      if (!it || !it.n) return;
      let cat = '기타', name = it.n;
      if (it.n.includes(':')) {
        const p = it.n.split(':');
        cat = p[0].trim() || '기타';
        name = p.slice(1).join(':').trim() || p[0];
      }
      if (name.toLowerCase().includes(query.toLowerCase())) {
        results.push({ name, cat, qty: it.q || 1, tag: d.tag, drawerName: d.name, mediaPath: d.mediaPath });
      }
    });
  });

  resultLabel.textContent = '검색결과 ' + results.length + '건';

  if (!results.length) {
    resultList.innerHTML = '<div class="empty-state"><div style="font-size:36px;margin-bottom:12px">🔍</div>"' + query + '"에 대한 결과가 없어요</div>';
    return;
  }

  resultList.innerHTML = results.map((r, i) => {
    const thumb = r.mediaPath
      ? `<div class="result-ico result-thumb" data-thumb="${i}" data-path="${encodeURIComponent(r.mediaPath)}" onclick="event.stopPropagation();openThumbFull(${i})"><div class="thumb-skel"></div></div>`
      : `<div class="result-ico">\n        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>\n      </div>`;
    return `\n    <div class="result-item" onclick="location.href='drawer.html?tag=${r.tag}'">\n      ${thumb}\n      <div class="result-info">\n        <div class="result-name">${highlight(r.name, query)}</div>\n        <div class="result-meta"><b>${r.drawerName}</b> · ${r.cat} · ${r.qty}개</div>\n      </div>\n      <button class="go-btn" onclick="event.stopPropagation();location.href='drawer.html?tag=${r.tag}'">${window.t?t('go'):'이동'}</button>\n    </div>\n  `;
  }).join('');
  loadThumbnails();
}

// 검색 결과 썸네일을 비동기로 채움 (user_uploads는 비공개 버킷 → createSignedUrl 사용)
window._thumbUrls = {};
async function loadThumbnails() {
  const els = document.querySelectorAll('.result-thumb[data-path]');
  for (const el of els) {
    const idx = el.getAttribute('data-thumb');
    const path = decodeURIComponent(el.getAttribute('data-path'));
    try {
      const { data: sd, error } = await _searchSb.storage.from('user_uploads').createSignedUrl(path, 3600);
      if (error || !sd) { el.classList.remove('result-thumb'); continue; }
      const isV = /\.(mp4|mov|webm)/i.test(path) || path.includes('video');
      window._thumbUrls[idx] = { url: sd.signedUrl, isVideo: isV };
      el.innerHTML = isV
        ? `<video src="${sd.signedUrl}#t=0.1" muted playsinline preload="metadata"></video>`
        : `<img src="${sd.signedUrl}" alt="">`;
    } catch (e) {
      el.classList.remove('result-thumb');
    }
  }
}

// 썸네일 탭 시 전체화면 확대 (색상으로 못 집는 물건을 눈으로 확인)
function openThumbFull(idx) {
  const t = window._thumbUrls[idx];
  if (!t) return;
  const ov = document.getElementById('thumb-fs-ov');
  const c = document.getElementById('thumb-fs-content');
  c.innerHTML = t.isVideo
    ? `<video src="${t.url}" controls autoplay playsinline style="max-width:100%;max-height:100%;object-fit:contain"></video>`
    : `<img src="${t.url}" style="max-width:100%;max-height:100%;object-fit:contain">`;
  ov.classList.add('open');
}
function closeThumbFull() {
  const ov = document.getElementById('thumb-fs-ov');
  ov.classList.remove('open');
  document.getElementById('thumb-fs-content').innerHTML = '';
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  onSearch();

}

var _OB_I=0, _OB_S=[], _OB_KEY='';
function obStart(steps, key){
  if(localStorage.getItem(key)==='1') return;
  _OB_I=0; _OB_S=steps; _OB_KEY=key;
  document.getElementById('ob-ov').classList.add('on');
  document.getElementById('ob-ov').onclick=function(){obClose();};
  obShow(0);
}
function obShow(i){
  var s=_OB_S[i]; if(!s){obDone();return;}
  var el=document.querySelector(s.sel);
  if(!el){_OB_I++;obShow(_OB_I);return;}
  document.getElementById('ob-nn').textContent=(i+1)+' / '+_OB_S.length;
  document.getElementById('ob-tt').textContent=s.title;
  document.getElementById('ob-dd').textContent=s.desc;
  var ww=document.getElementById('ob-ww');
  if(s.warn){ww.textContent=s.warn;ww.style.display='block';}else{ww.style.display='none';}
  document.getElementById('ob-nxt').textContent=i===_OB_S.length-1?'완료 ✓':'다음 →';
  document.getElementById('ob-prev').style.display=i>0?'':'none';
  document.getElementById('ob-close').style.display=i===_OB_S.length-1?'none':'';
  el.scrollIntoView({block:'center',behavior:'smooth'});
  setTimeout(function(){
    var r=el.getBoundingClientRect();
    var hl=document.getElementById('ob-hl');
    hl.style.left=(r.left-5)+'px';
    hl.style.top=(r.top-5)+'px';
    hl.style.width=(r.width+10)+'px';
    hl.style.height=(r.height+10)+'px';
  },350);
}
function obNext(){_OB_I++;obShow(_OB_I);}
function obPrev(){if(_OB_I>0){_OB_I--;obShow(_OB_I);}}
function obDone(){localStorage.setItem(_OB_KEY,'1');obClose();}
function obClose(){
  document.getElementById('ob-ov').classList.remove('on');
  document.getElementById('ob-hl').style.width='0';
  localStorage.setItem(_OB_KEY,'1');
}
function startOnboarding(){
  obStart([
    {sel:'.mypage-btn',title:'마이페이지',desc:'우측 상단 아이콘을 클릭하시면 마이페이지로 이동합니다.\nAI 이용권 확인, 테마 설정, 계정 관리 등 다양한 기능을 이용하실 수 있습니다.',warn:null},
    {sel:'.search-wrap',title:'통합 검색',desc:'수납장 목록을 등록한 뒤 물품명을 검색하시면, 해당 물품이 보관된 수납장을 손쉽게 확인하실 수 있습니다.',warn:null}
  ], 'ob_index_done');
}
async function checkSystemAnnouncement(){
  try{
    var _annSb=(typeof window!=='undefined'&&window._searchSb)?window._searchSb:(typeof sb!=='undefined'?sb:null);
    if(!_annSb)return;
    var r=await _annSb.from('system_announcements').select('*').eq('active',true).order('created_at',{ascending:false}).limit(1);
    if(r.error||!r.data||!r.data.length)return;
    var ann=r.data[0];
    if(ann.ends_at&&new Date(ann.ends_at)<new Date())return;
    if(ann.type==='maintenance'){
      document.getElementById('maintenance-msg').innerHTML=ann.message.replace(/\n/g,'<br>');
      document.getElementById('maintenance-ov').classList.add('show');
    }else{
      // 검색 화면에서는 배너 표시 안 함 — 공지함(🔔)에서만 확인
      if(!localStorage.getItem('gyeol_ann_seen_'+ann.id)){
        var dot=document.getElementById('bell-dot');
        if(dot)dot.style.display='block';
        window._pendingAnnId=ann.id;
      }
    }
  }catch(e){console.log('공지 체크 실패',e.message);}
}
var _noticeData=[];
async function openNoticeBox(){
  if(window._pendingAnnId){localStorage.setItem('gyeol_ann_seen_'+window._pendingAnnId,'1');window._pendingAnnId=null;}
  var dot=document.getElementById('bell-dot');if(dot)dot.style.display='none';
  var ov=document.getElementById('notice-ov');if(ov)ov.classList.add('open');
  await loadNotices();
}
function closeNoticeBox(){var ov=document.getElementById('notice-ov');if(ov)ov.classList.remove('open');}
async function loadNotices(){
  var list=document.getElementById('notice-list');
  var detail=document.getElementById('notice-detail');
  var backBtn=document.getElementById('notice-back-btn');
  var hdTitle=document.getElementById('notice-hd-title');
  list.style.display='block';detail.style.display='none';
  if(backBtn)backBtn.style.display='none';
  if(hdTitle)hdTitle.textContent='공지사항';
  list.innerHTML='<div class="notice-empty">불러오는 중...</div>';
  try{
    var _annSb=(typeof window._searchSb!=='undefined'&&window._searchSb)?window._searchSb:(typeof sb!=='undefined'?sb:null);
    if(!_annSb){list.innerHTML='<div class="notice-empty">불러올 수 없습니다</div>';return;}
    var r=await _annSb.from('system_announcements').select('*').eq('active',true).neq('type','maintenance').order('created_at',{ascending:false}).limit(20);
    if(r.error||!r.data){list.innerHTML='<div class="notice-empty">불러올 수 없습니다</div>';return;}
    _noticeData=r.data;
    if(!r.data.length){list.innerHTML='<div class="notice-empty">등록된 공지사항이 없습니다</div>';return;}
    list.innerHTML='';
    r.data.forEach(function(ann,i){
      var d=new Date(ann.created_at);
      var ds=(d.getFullYear()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getDate().toString().padStart(2,'0'));
      var el=document.createElement('div');el.className='notice-item';
      el.innerHTML='<div class="notice-item-title">'+_esc(ann.title||'공지사항')+'</div><div class="notice-item-date">'+ds+'</div><div class="notice-item-arr"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>';
      el.onclick=function(){showNoticeDetail(i);};
      list.appendChild(el);
    });
  }catch(e){list.innerHTML='<div class="notice-empty">불러올 수 없습니다</div>';}
}
function showNoticeDetail(idx){
  var ann=_noticeData[idx];if(!ann)return;
  var list=document.getElementById('notice-list');
  var detail=document.getElementById('notice-detail');
  var backBtn=document.getElementById('notice-back-btn');
  var hdTitle=document.getElementById('notice-hd-title');
  list.style.display='none';detail.style.display='block';
  if(backBtn)backBtn.style.display='flex';
  if(hdTitle)hdTitle.textContent=ann.title||'공지사항';
  var d=new Date(ann.created_at);
  var ds=(d.getFullYear()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getDate().toString().padStart(2,'0'));
  detail.innerHTML='<div class="notice-detail-title">'+_esc(ann.title||'공지사항')+'</div><div class="notice-detail-date">'+ds+'</div><div class="notice-detail-body">'+_esc(ann.message||'')+'</div>';
}
function noticeGoBack(){
  var list=document.getElementById('notice-list');
  var detail=document.getElementById('notice-detail');
  var backBtn=document.getElementById('notice-back-btn');
  var hdTitle=document.getElementById('notice-hd-title');
  list.style.display='block';detail.style.display='none';
  if(backBtn)backBtn.style.display='none';
  if(hdTitle)hdTitle.textContent='공지사항';
}
function _esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function closeAnnounce(){
  var bar=document.getElementById('announce-bar');
  bar.classList.remove('show');
  var hd=document.querySelector('.header');if(hd)hd.style.marginTop='';
  var id=bar.dataset.annId;
  if(id){
    localStorage.setItem('gyeol_ann_dismissed_'+id,'1');
    localStorage.setItem('gyeol_ann_seen_'+id,'1');
  }
  var dot=document.getElementById('bell-dot');
  if(dot)dot.style.display='none';
  window._pendingAnnId=null;
}
