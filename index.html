<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
input { -webkit-user-select: text; user-select: text; }

:root {
  --bg: #0C1220;
  --surface: #161D2E;
  --surface2: #1E2740;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --txt: #FFFFFF;
  --txt2: rgba(255,255,255,0.55);
  --txt3: rgba(255,255,255,0.28);
  --accent: #52C498;
  --accent-bg: rgba(82,196,152,0.1);
  --font: 'DM Sans','Noto Sans KR',sans-serif;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--txt);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}

/* HEADER */
.header {
  padding: 20px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.brand {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--txt);
}
.brand span {
  color: var(--accent);
}
.header-sub {
  font-size: 11px;
  color: var(--txt3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 500;
}

/* SEARCH AREA */
.search-area {
  padding: 24px 20px 0;
}
.search-wrap {
  position: relative;
}
.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px;
  height: 18px;
  stroke: var(--txt3);
  stroke-width: 2;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  pointer-events: none;
  transition: stroke 0.2s;
}
.search-wrap:focus-within .search-icon {
  stroke: var(--accent);
}
.search-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px 16px 16px 48px;
  font-size: 15px;
  font-family: var(--font);
  font-weight: 400;
  color: var(--txt);
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none;
}
.search-input::placeholder { color: var(--txt3); }
.search-input:focus {
  border-color: var(--border2);
  background: var(--surface2);
}
.clear-btn {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: none;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  color: var(--txt2);
  font-size: 14px;
  line-height: 1;
}
.clear-btn.vis { display: flex; }

/* DRAWER LIST (기본 상태) */
.section {
  padding: 28px 20px 0;
}
.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--txt3);
  margin-bottom: 12px;
}

.drawer-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.drawer-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 18px 16px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  text-decoration: none;
  display: block;
}
.drawer-card:active {
  background: var(--surface2);
  border-color: var(--border2);
}
.drawer-card-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--txt);
  letter-spacing: -0.01em;
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.drawer-card-count {
  font-size: 11px;
  color: var(--txt3);
  font-weight: 400;
}
.drawer-card-count b {
  color: var(--accent);
  font-weight: 600;
}
.drawer-card-arrow {
  margin-top: 14px;
  width: 20px;
  height: 20px;
  stroke: var(--txt3);
  stroke-width: 2;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* RESULT LIST */
.result-list {
  padding: 16px 20px 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.result-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  text-decoration: none;
}
.result-item:active {
  background: var(--surface2);
  border-color: var(--border2);
}
.result-ico {
  width: 38px;
  height: 38px;
  border-radius: 11px;
  background: var(--accent-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.result-ico svg {
  width: 18px;
  height: 18px;
  stroke: var(--accent);
  stroke-width: 1.8;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.result-info { flex: 1; min-width: 0; }
.result-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--txt);
  letter-spacing: -0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.result-name mark {
  background: none;
  color: var(--accent);
}
.result-meta {
  font-size: 11px;
  color: var(--txt3);
  margin-top: 3px;
}
.result-meta b { color: var(--txt2); font-weight: 500; }
.go-btn {
  flex-shrink: 0;
  padding: 7px 14px;
  border-radius: 10px;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border2);
  color: var(--txt2);
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
.go-btn:active { background: rgba(255,255,255,0.12); }

/* EMPTY STATE */
.empty-state {
  padding: 60px 20px;
  text-align: center;
  display: none;
}
.empty-state.vis { display: block; }
.empty-ico {
  width: 48px;
  height: 48px;
  stroke: var(--txt3);
  stroke-width: 1.5;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
  margin: 0 auto 14px;
}
.empty-txt { font-size: 14px; color: var(--txt3); }
.empty-kw { color: var(--txt2); font-weight: 600; }

/* RESULT HEADER */
.result-header {
  padding: 20px 20px 0;
  display: none;
}
.result-header.vis { display: block; }
.result-count {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--txt3);
}
.result-count b { color: var(--accent); }

/* BOTTOM SAFE */
.bottom-safe { height: 40px; }
</style>
</head>
<body>

<div class="header">
  <div class="brand">공간<span>:</span>결</div>
  <div class="header-sub">Smart Storage</div>
</div>

<div class="search-area">
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search-input" class="search-input" type="text" placeholder="물건 이름으로 검색" autocomplete="off" autocorrect="off" spellcheck="false" oninput="onSearch()">
    <button class="clear-btn" id="clear-btn" onclick="clearSearch()">✕</button>
  </div>
</div>

<!-- 기본: 서랍 목록 -->
<div class="section" id="drawer-section">
  <div class="section-label">내 서랍 목록</div>
  <div class="drawer-grid" id="drawer-grid"></div>
</div>

<!-- 검색 결과 -->
<div class="result-header" id="result-header">
  <div class="result-count" id="result-count"></div>
</div>
<div class="result-list" id="result-list"></div>

<!-- 검색 결과 없음 -->
<div class="empty-state" id="empty-state">
  <svg class="empty-ico" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
  <div class="empty-txt"><span class="empty-kw" id="empty-kw"></span>에 대한 결과가 없어요</div>
</div>

<div class="bottom-safe"></div>

<script>
// ── 데이터 로드 ──────────────────────────────────────────
function getAllDrawers() {
  const drawers = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('gyeol_')) {
      const tag = key.replace('gyeol_', '');
      const items = JSON.parse(localStorage.getItem(key) || '[]');
      const name = localStorage.getItem('name_' + tag) || tag;
      drawers.push({ tag, name, items });
    }
  }
  // 이름 기준 정렬
  drawers.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
  return drawers;
}

// ── 서랍 목록 렌더 ───────────────────────────────────────
function renderDrawers() {
  const drawers = getAllDrawers();
  const grid = document.getElementById('drawer-grid');
  if (!drawers.length) {
    grid.innerHTML = '<div style="color:rgba(255,255,255,0.25);font-size:13px;padding:8px 0;grid-column:1/-1;">등록된 서랍이 없습니다</div>';
    return;
  }
  grid.innerHTML = drawers.map(d => `
    <a class="drawer-card" href="drawer.html?tag=${d.tag}">
      <div class="drawer-card-name">${d.name}</div>
      <div class="drawer-card-count"><b>${d.items.length}</b> 종류</div>
      <svg class="drawer-card-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </a>
  `).join('');
}

// ── 검색 ─────────────────────────────────────────────────
function highlight(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx) + '<mark>' + text.slice(idx, idx + query.length) + '</mark>' + text.slice(idx + query.length);
}

function onSearch() {
  const query = document.getElementById('search-input').value.trim();
  const clearBtn = document.getElementById('clear-btn');
  const drawerSection = document.getElementById('drawer-section');
  const resultHeader = document.getElementById('result-header');
  const resultList = document.getElementById('result-list');
  const emptyState = document.getElementById('empty-state');

  clearBtn.classList.toggle('vis', query.length > 0);

  if (!query) {
    drawerSection.style.display = '';
    resultHeader.classList.remove('vis');
    resultList.innerHTML = '';
    emptyState.classList.remove('vis');
    return;
  }

  drawerSection.style.display = 'none';

  const drawers = getAllDrawers();
  const results = [];

  drawers.forEach(d => {
    d.items.forEach(it => {
      let cat = '기타', name = it.n;
      if (it.n.includes(':')) {
        const p = it.n.split(':');
        cat = p[0].trim() || '기타';
        name = p.slice(1).join(':').trim() || p[0];
      }
      if (name.toLowerCase().includes(query.toLowerCase())) {
        results.push({ name, cat, qty: it.q || 1, tag: d.tag, drawerName: d.name });
      }
    });
  });

  // 결과 카운트
  document.getElementById('result-count').innerHTML =
    `검색결과 <b>${results.length}</b>건`;
  resultHeader.classList.toggle('vis', true);

  if (!results.length) {
    resultList.innerHTML = '';
    document.getElementById('empty-kw').textContent = query;
    emptyState.classList.add('vis');
    return;
  }

  emptyState.classList.remove('vis');
  resultList.innerHTML = results.map(r => `
    <div class="result-item" onclick="location.href='drawer.html?tag=${r.tag}'">
      <div class="result-ico">
        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </div>
      <div class="result-info">
        <div class="result-name">${highlight(r.name, query)}</div>
        <div class="result-meta"><b>${r.drawerName}</b> · ${r.cat} · ${r.qty}개</div>
      </div>
      <button class="go-btn" onclick="event.stopPropagation(); location.href='drawer.html?tag=${r.tag}'">이동</button>
    </div>
  `).join('');
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  onSearch();
  document.getElementById('search-input').focus();
}

// ── 초기화 ───────────────────────────────────────────────
renderDrawers();
</script>
</body>
</html>
