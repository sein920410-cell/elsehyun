<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
input { -webkit-user-select: text; user-select: text; }

body {
  font-family: 'DM Sans','Noto Sans KR',sans-serif;
  background: #d9ead2;
  min-height: 100dvh;
  color: #1a2e1a;
  -webkit-font-smoothing: antialiased;
}

.header {
  padding: 28px 20px 0;
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
  flex: 1;
  color: #fff;
}
.header-sub {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  font-weight: 600;
}

.search-area { padding: 60px 20px 0; }

.hero-text {
  text-align: center;
  margin-bottom: 20px;
}
.hero-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
  color: #1a2e1a;
}
.hero-sub {
  font-size: 13px;
  color: rgba(26,46,26,0.45);
}

.search-wrap { position: relative; }
.search-icon {
  position: absolute; left: 16px; top: 50%;
  transform: translateY(-50%);
  width: 17px; height: 17px;
  stroke: rgba(26,46,26,0.35);
  stroke-width: 2; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
  pointer-events: none;
}
.search-input {
  width: 100%;
  background: #fff;
  border: none;
  border-radius: 16px;
  padding: 16px 44px 16px 46px;
  font-size: 15px;
  font-family: inherit;
  color: #1a2e1a;
  outline: none;
  box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  -webkit-appearance: none;
}
.search-input::placeholder { color: rgba(26,46,26,0.3); }
.clear-btn {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  width: 26px; height: 26px; border-radius: 50%;
  background: rgba(0,0,0,0.06); border: none;
  color: rgba(26,46,26,0.5); cursor: pointer;
  font-size: 12px; display: none;
  align-items: center; justify-content: center;
}
.clear-btn.vis { display: flex; }

.result-area { padding: 20px 20px 0; }
.result-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(26,46,26,0.35); margin-bottom: 12px;
}

.result-item {
  background: #5b5b5b;
  border-radius: 16px;
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 8px; cursor: pointer;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  transition: transform 0.1s;
}
.result-item:active { transform: scale(0.98); }

.result-ico {
  width: 38px; height: 38px; border-radius: 11px;
  background: rgba(26,46,26,0.07);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.result-ico svg {
  width: 18px; height: 18px;
  stroke: #1a2e1a; stroke-width: 1.8; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
}
.result-info { flex: 1; min-width: 0; }
.result-name {
  font-size: 14px; font-weight: 700;
  color: #1a2e1a; letter-spacing: -0.01em;
}
.result-name mark { background: none; color: #1a2e1a; font-weight: 900; text-decoration: underline; }
.result-meta { font-size: 11px; color: #94a3b8; margin-top: 3px; }
.result-meta b { color: #64748b; font-weight: 600; }

.go-btn {
  padding: 7px 14px; border-radius: 10px;
  background: #111; border: none;
  color: #fff; font-size: 12px; font-weight: 700;
  font-family: inherit; cursor: pointer; white-space: nowrap;
  flex-shrink: 0;
}

.empty-state {
  text-align: center; padding: 60px 20px;
  color: rgba(26,46,26,0.35); font-size: 14px;
}
.bottom-safe { height: 40px; }
</style>
</head>
<body>

<div class="header">
  <div class="brand">공간:결</div>
  <div class="header-sub">Smart Storage</div>
</div>

<div class="search-area">
  <div class="hero-text" id="hero-text">
    <div class="hero-title">무엇을 찾으시나요?</div>
    <div class="hero-sub">물건 이름을 입력하면 위치를 알려드려요</div>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search-input" class="search-input" type="text" placeholder="물건 이름으로 검색" autocomplete="off" autocorrect="off" spellcheck="false" oninput="onSearch()">
    <button class="clear-btn" id="clear-btn" onclick="clearSearch()">✕</button>
  </div>
</div>

<div id="result-area" style="display:none" class="result-area">
  <div class="result-label" id="result-label"></div>
  <div id="result-list"></div>
</div>

<div class="bottom-safe"></div>

<script>
function getAllDrawers() {
  const drawers = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key || !key.startsWith('gyeol_')) continue;
    const tag = key.replace('gyeol_', '');
    const raw = localStorage.getItem(key);
    let items = [];
    try { items = JSON.parse(raw) || []; } catch(e) {}
    if (!Array.isArray(items)) continue;
    const name = localStorage.getItem('name_' + tag) || formatTag(tag);
    drawers.push({ tag, name, items });
  }
  return drawers;
}

function formatTag(tag) {
  // DRAWER001 → 서랍 1, DRAWER002 → 서랍 2
  const m = tag.match(/DRAWER0*(\d+)/i);
  if (m) return '서랍 ' + parseInt(m[1]);
  return tag;
}

function highlight(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx)
    + '<mark>' + text.slice(idx, idx + query.length) + '</mark>'
    + text.slice(idx + query.length);
}

function onSearch() {
  const query = document.getElementById('search-input').value.trim();
  const clearBtn = document.getElementById('clear-btn');
  const heroText = document.getElementById('hero-text');
  const resultArea = document.getElementById('result-area');
  const resultLabel = document.getElementById('result-label');
  const resultList = document.getElementById('result-list');

  clearBtn.classList.toggle('vis', query.length > 0);

  if (!query) {
    heroText.style.display = '';
    resultArea.style.display = 'none';
    resultList.innerHTML = '';
    return;
  }

  heroText.style.display = 'none';
  resultArea.style.display = 'block';

  const drawers = getAllDrawers();
  const results = [];
  drawers.forEach(d => {
    d.items.forEach(it => {
      if (!it || !it.n) return;
      let cat = '기타', name = it.n;
      if (it.n.includes(':')) {
        const p = it.n.split(':');
        cat = p[0].trim() || '기타';
        name = p.slice(1).join(':').trim() || p[0];
      }
      if (name.toLowerCase().includes(query.toLowerCase())) {
        results.push({ name, cat, qty: it.q || 1, tag: d.tag, drawerName: d.name });
      }
    });
  });

  resultLabel.textContent = '검색결과 ' + results.length + '건';

  if (!results.length) {
    resultList.innerHTML = '<div class="empty-state"><div style="font-size:36px;margin-bottom:12px">🔍</div>"' + query + '"에 대한 결과가 없어요</div>';
    return;
  }

  resultList.innerHTML = results.map(r => `
    <div class="result-item" onclick="location.href='drawer.html?tag=${r.tag}'">
      <div class="result-ico">
        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </div>
      <div class="result-info">
        <div class="result-name">${highlight(r.name, query)}</div>
        <div class="result-meta"><b>${r.drawerName}</b> · ${r.cat} · ${r.qty}개</div>
      </div>
      <button class="go-btn" onclick="event.stopPropagation();location.href='drawer.html?tag=${r.tag}'">이동</button>
    </div>
  `).join('');
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  onSearch();
  document.getElementById('search-input').focus();
}
</script>
</body>
</html>
