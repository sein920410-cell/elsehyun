<script>
function getAllDrawers() {
  const drawers = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key || !key.startsWith('gyeol_')) continue;
    const tag = key.replace('gyeol_', '');
    const raw = localStorage.getItem(key);
    let items = [];
    try { items = JSON.parse(raw) || []; } catch(e) {}
    if (!Array.isArray(items)) continue;
    const name = localStorage.getItem('name_' + tag) || formatTag(tag);
    drawers.push({ tag, name, items });
  }
  return drawers;
}

function formatTag(tag) {
  // 신규 시리얼: GYEOL-1-DR1 → 서랍 1, GYEOL-1-MAIN → 메인
  const mNew = tag.match(/GYEOL-(\d+)-(DR(\d+)|MAIN)/i);
  if (mNew) {
    if (mNew[2].toUpperCase() === 'MAIN') return '메인';
    return '서랍 ' + mNew[3];
  }
  const m = tag.match(/DRAWER0*(\d+)/i);
  if (m) return '서랍 ' + parseInt(m[1]);
  return tag;
}

function highlight(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx)
    + '<mark>' + text.slice(idx, idx + query.length) + '</mark>'
    + text.slice(idx + query.length);
}

function drawerIcon(tag){
  if(/GYEOL-S-/i.test(tag)) return '<svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>';
  return '<svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.3 7 12 12 20.7 7"/><line x1="12" y1="12" x2="12" y2="21"/></svg>';
}
function renderDrawers(){
  const area=document.getElementById('drawers-area');
  const list=document.getElementById('drawers-list');
  const cntEl=document.getElementById('drawers-count');
  if(!area||!list)return;
  const drawers=getAllDrawers();
  if(!drawers.length){ area.style.display='none'; return; }
  cntEl.textContent=drawers.length+'곳';
  list.innerHTML=drawers.map(d=>{
    const n=d.items.length;
    const isSingle=/GYEOL-S-/i.test(d.tag);
    const sub=isSingle?('단품 · '+n+'개'):(n+'개 보관 중');
    return `<div class="drawer-card" onclick="location.href='drawer.html?tag=${d.tag}'">
      <div class="drawer-card-ico">${drawerIcon(d.tag)}</div>
      <div class="drawer-card-info">
        <div class="drawer-card-name">${d.name}</div>
        <div class="drawer-card-sub">${sub}</div>
      </div>
      <svg class="drawer-card-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </div>`;
  }).join('');
  area.style.display='block';
}

function onSearch() {
  const query = document.getElementById('search-input').value.trim();
  const clearBtn = document.getElementById('clear-btn');
  const heroText = document.getElementById('hero-text');
  const resultArea = document.getElementById('result-area');
  const resultLabel = document.getElementById('result-label');
  const resultList = document.getElementById('result-list');

  clearBtn.classList.toggle('vis', query.length > 0);

  if (!query) {
    heroText.style.display = '';
    resultArea.style.display = 'none';
    resultList.innerHTML = '';
    renderDrawers();
    return;
  }

  heroText.style.display = 'none';
  resultArea.style.display = 'block';
  document.getElementById('drawers-area').style.display = 'none';

  const drawers = getAllDrawers();
  const results = [];
  drawers.forEach(d => {
    d.items.forEach(it => {
      if (!it || !it.n) return;
      let cat = '기타', name = it.n;
      if (it.n.includes(':')) {
        const p = it.n.split(':');
        cat = p[0].trim() || '기타';
        name = p.slice(1).join(':').trim() || p[0];
      }
      if (name.toLowerCase().includes(query.toLowerCase())) {
        results.push({ name, cat, qty: it.q || 1, tag: d.tag, drawerName: d.name });
      }
    });
  });

  resultLabel.textContent = '검색결과 ' + results.length + '건';

  if (!results.length) {
    resultList.innerHTML = '<div class="empty-state"><div style="font-size:36px;margin-bottom:12px">🔍</div>"' + query + '"에 대한 결과가 없어요</div>';
    return;
  }

  resultList.innerHTML = results.map(r => `\n    <div class="result-item" onclick="location.href='drawer.html?tag=${r.tag}'">\n      <div class="result-ico">\n        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>\n      </div>\n      <div class="result-info">\n        <div class="result-name">${highlight(r.name, query)}</div>\n        <div class="result-meta"><b>${r.drawerName}</b> · ${r.cat} · ${r.qty}개</div>\n      </div>\n      <button class="go-btn" onclick="event.stopPropagation();location.href='drawer.html?tag=${r.tag}'">${window.t?t('go'):'이동'}</button>\n    </div>\n  `).join('');
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  onSearch();
  document.getElementById('search-input').focus();
}

var _OB_I=0, _OB_S=[], _OB_KEY='';
function obStart(steps, key){
  if(localStorage.getItem(key)==='1') return;
  _OB_I=0; _OB_S=steps; _OB_KEY=key;
  document.getElementById('ob-ov').classList.add('on');
  document.getElementById('ob-ov').onclick=function(){obClose();};
  obShow(0);
}
function obShow(i){
  var s=_OB_S[i]; if(!s){obDone();return;}
  var el=document.querySelector(s.sel);
  if(!el){_OB_I++;obShow(_OB_I);return;}
  document.getElementById('ob-nn').textContent=(i+1)+' / '+_OB_S.length;
  document.getElementById('ob-tt').textContent=s.title;
  document.getElementById('ob-dd').textContent=s.desc;
  var ww=document.getElementById('ob-ww');
  if(s.warn){ww.textContent=s.warn;ww.style.display='block';}else{ww.style.display='none';}
  document.getElementById('ob-nxt').textContent=i===_OB_S.length-1?'완료 ✓':'다음 →';
  document.getElementById('ob-prev').style.display=i>0?'':'none';
  document.getElementById('ob-close').style.display=i===_OB_S.length-1?'none':'';
  el.scrollIntoView({block:'center',behavior:'smooth'});
  setTimeout(function(){
    var r=el.getBoundingClientRect();
    var hl=document.getElementById('ob-hl');
    hl.style.left=(r.left-5)+'px';
    hl.style.top=(r.top-5)+'px';
    hl.style.width=(r.width+10)+'px';
    hl.style.height=(r.height+10)+'px';
  },350);
}
function obNext(){_OB_I++;obShow(_OB_I);}
function obPrev(){if(_OB_I>0){_OB_I--;obShow(_OB_I);}}
function obDone(){localStorage.setItem(_OB_KEY,'1');obClose();}
function obClose(){
  document.getElementById('ob-ov').classList.remove('on');
  document.getElementById('ob-hl').style.width='0';
  localStorage.setItem(_OB_KEY,'1');
}
function startOnboarding(){
  obStart([
    {sel:'.mypage-btn',title:'마이페이지',desc:'우측 상단 아이콘을 클릭하시면 마이페이지로 이동합니다.\nAI 이용권 확인, 테마 설정, 계정 관리 등 다양한 기능을 이용하실 수 있습니다.',warn:null},
    {sel:'.search-wrap',title:'통합 검색',desc:'수납장 목록을 등록한 뒤 물품명을 검색하시면, 해당 물품이 보관된 수납장을 손쉽게 확인하실 수 있습니다.',warn:null}
  ], 'ob_index_done');
}
