<script>
function getAllDrawers() {
  const drawers = [];
  const SETTING_KEYS = ['gyeol_theme','gyeol_size','gyeol_lang'];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key || !key.startsWith('gyeol_')) continue;
    if (SETTING_KEYS.indexOf(key) !== -1) continue;
    const tag = key.replace('gyeol_', '');
    if (!/^GYEOL-/i.test(tag)) continue;
    const raw = localStorage.getItem(key);
    let items = [];
    try { items = JSON.parse(raw) || []; } catch(e) {}
    if (!Array.isArray(items)) continue;
    const name = localStorage.getItem('name_' + tag) || formatTag(tag);
    const mediaPath = localStorage.getItem('mediaPath_' + tag) || null;
    drawers.push({ tag, name, items, mediaPath });
  }
  return drawers;
}

function formatTag(tag) {
  // 신규 시리얼: GYEOL-1-DR1 → 서랍 1, GYEOL-1-MAIN → 메인
  const mNew = tag.match(/GYEOL-(\d+)-(DR(\d+)|MAIN)/i);
  if (mNew) {
    if (mNew[2].toUpperCase() === 'MAIN') return '메인';
    return '서랍 ' + mNew[3];
  }
  const m = tag.match(/DRAWER0*(\d+)/i);
  if (m) return '서랍 ' + parseInt(m[1]);
  return tag;
}

function highlight(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx)
    + '<mark>' + text.slice(idx, idx + query.length) + '</mark>'
    + text.slice(idx + query.length);
}

function onSearch() {
  const query = document.getElementById('search-input').value.trim();
  const clearBtn = document.getElementById('clear-btn');
  const heroText = document.getElementById('hero-text');
  const searchHint = document.getElementById('search-hint');
  const resultArea = document.getElementById('result-area');
  const resultLabel = document.getElementById('result-label');
  const resultList = document.getElementById('result-list');

  clearBtn.classList.toggle('vis', query.length > 0);

  if (!query) {
    heroText.style.display = '';
    if (searchHint) searchHint.style.display = '';
    resultArea.style.display = 'none';
    resultList.innerHTML = '';
    return;
  }

  heroText.style.display = 'none';
  if (searchHint) searchHint.style.display = 'none';
  resultArea.style.display = 'block';

  const drawers = getAllDrawers();
  const results = [];
  drawers.forEach(d => {
    d.items.forEach(it => {
      if (!it || !it.n) return;
      let cat = '기타', name = it.n;
      if (it.n.includes(':')) {
        const p = it.n.split(':');
        cat = p[0].trim() || '기타';
        name = p.slice(1).join(':').trim() || p[0];
      }
      if (name.toLowerCase().includes(query.toLowerCase())) {
        results.push({ name, cat, qty: it.q || 1, tag: d.tag, drawerName: d.name, mediaPath: d.mediaPath });
      }
    });
  });

  resultLabel.textContent = '검색결과 ' + results.length + '건';

  if (!results.length) {
    resultList.innerHTML = '<div class="empty-state"><div style="font-size:36px;margin-bottom:12px">🔍</div>"' + query + '"에 대한 결과가 없어요</div>';
    return;
  }

  resultList.innerHTML = results.map((r, i) => {
    const thumb = r.mediaPath
      ? `<div class="result-ico result-thumb" data-thumb="${i}" data-path="${encodeURIComponent(r.mediaPath)}" onclick="event.stopPropagation();openThumbFull(${i})"><div class="thumb-skel"></div></div>`
      : `<div class="result-ico">\n        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>\n      </div>`;
    return `\n    <div class="result-item" onclick="location.href='drawer.html?tag=${r.tag}'">\n      ${thumb}\n      <div class="result-info">\n        <div class="result-name">${highlight(r.name, query)}</div>\n        <div class="result-meta"><b>${r.drawerName}</b> · ${r.cat} · ${r.qty}개</div>\n      </div>\n      <button class="go-btn" onclick="event.stopPropagation();location.href='drawer.html?tag=${r.tag}'">${window.t?t('go'):'이동'}</button>\n    </div>\n  `;
  }).join('');
  loadThumbnails();
}

// 검색 결과 썸네일을 비동기로 채움 (user_uploads는 비공개 버킷 → createSignedUrl 사용)
window._thumbUrls = {};
async function loadThumbnails() {
  const els = document.querySelectorAll('.result-thumb[data-path]');
  for (const el of els) {
    const idx = el.getAttribute('data-thumb');
    const path = decodeURIComponent(el.getAttribute('data-path'));
    try {
      const { data: sd, error } = await _searchSb.storage.from('user_uploads').createSignedUrl(path, 3600);
      if (error || !sd) { el.classList.remove('result-thumb'); continue; }
      const isV = /\.(mp4|mov|webm)/i.test(path) || path.includes('video');
      window._thumbUrls[idx] = { url: sd.signedUrl, isVideo: isV };
      el.innerHTML = isV
        ? `<video src="${sd.signedUrl}#t=0.1" muted playsinline preload="metadata"></video>`
        : `<img src="${sd.signedUrl}" alt="">`;
    } catch (e) {
      el.classList.remove('result-thumb');
    }
  }
}

// 썸네일 탭 시 전체화면 확대 (색상으로 못 집는 물건을 눈으로 확인)
function openThumbFull(idx) {
  const t = window._thumbUrls[idx];
  if (!t) return;
  const ov = document.getElementById('thumb-fs-ov');
  const c = document.getElementById('thumb-fs-content');
  c.innerHTML = t.isVideo
    ? `<video src="${t.url}" controls autoplay playsinline style="max-width:100%;max-height:100%;object-fit:contain"></video>`
    : `<img src="${t.url}" style="max-width:100%;max-height:100%;object-fit:contain">`;
  ov.classList.add('open');
}
function closeThumbFull() {
  const ov = document.getElementById('thumb-fs-ov');
  ov.classList.remove('open');
  document.getElementById('thumb-fs-content').innerHTML = '';
}

var _OB_I=0, _OB_S=[], _OB_KEY='';
function obStart(steps, key){
  if(localStorage.getItem(key)==='1') return;
  _OB_I=0; _OB_S=steps; _OB_KEY=key;
  document.getElementById('ob-ov').classList.add('on');
  document.getElementById('ob-ov').onclick=function(){obClose();};
  obShow(0);
}
function obShow(i){
  var s=_OB_S[i]; if(!s){obDone();return;}
  var el=document.querySelector(s.sel);
  if(!el){_OB_I++;obShow(_OB_I);return;}
  document.getElementById('ob-nn').textContent=(i+1)+' / '+_OB_S.length;
  document.getElementById('ob-tt').textContent=s.title;
  document.getElementById('ob-dd').textContent=s.desc;
  var ww=document.getElementById('ob-ww');
  if(s.warn){ww.textContent=s.warn;ww.style.display='block';}else{ww.style.display='none';}
  document.getElementById('ob-nxt').textContent=i===_OB_S.length-1?'완료 ✓':'다음 →';
  document.getElementById('ob-prev').style.display=i>0?'':'none';
  document.getElementById('ob-close').style.display=i===_OB_S.length-1?'none':'';
  el.scrollIntoView({block:'center',behavior:'smooth'});
  // 봄 포즈 교체
  if(s.pose){ document.getElementById('ob-bom-img').src='assets/character/'+s.pose; }
  setTimeout(function(){
    var r=el.getBoundingClientRect();
    var hl=document.getElementById('ob-hl');
    hl.style.left=(r.left-5)+'px';
    hl.style.top=(r.top-5)+'px';
    hl.style.width=(r.width+10)+'px';
    hl.style.height=(r.height+10)+'px';
    bomPlace(r);
  },380);
}
/* 봄 캐릭터를 하이라이트 요소 근처에 배치 + 대상 쪽으로 살짝 기울임 */
function bomPlace(r){
  var bom=document.getElementById('ob-bom');
  var vw=window.innerWidth, vh=window.innerHeight;
  var bw=118, bh=bom.offsetHeight||150;
  var cx=r.left+r.width/2;

  // 요소가 화면 위쪽이면 봄은 그 아래, 아니면 위에
  var below = r.top < vh*0.4;
  var top = below ? (r.bottom + 14) : (r.top - bh - 14);

  // 좌우: 요소 중심 기준, 화면 안쪽 보정
  var left = cx - bw/2;
  if(left < 8) left = 8;
  if(left+bw > vw-8) left = vw-bw-8;
  if(top < 8) top = 8;
  if(top+bh > vh-180) top = vh-180-bh;
  if(top < 8) top = 8;

  bom.style.left = left+'px';
  bom.style.top = top+'px';

  // 봄 중심과 대상 중심을 비교해 대상 쪽으로 기울임
  var bomCx = left + bw/2;
  bom.classList.remove('lean-left','lean-right');
  if(cx < bomCx - 20) bom.classList.add('lean-left');   // 대상이 봄 왼쪽 → 왼쪽으로 숙임
  else if(cx > bomCx + 20) bom.classList.add('lean-right');

  bom.classList.add('show');
}
function obNext(){_OB_I++;obShow(_OB_I);}
function obPrev(){if(_OB_I>0){_OB_I--;obShow(_OB_I);}}
function obDone(){localStorage.setItem(_OB_KEY,'1');obClose();}
function obClose(){
  document.getElementById('ob-ov').classList.remove('on');
  document.getElementById('ob-hl').style.width='0';
  var bom=document.getElementById('ob-bom');
  bom.classList.remove('show','lean-left','lean-right');
  localStorage.setItem(_OB_KEY,'1');
}

var _bomTimers=[], _bomDone=false;
function _bt(fn,ms){ var id=setTimeout(fn,ms); _bomTimers.push(id); return id; }

function bomHello(){
  if(localStorage.getItem('bom_intro_done')==='1'){ _bt(startOnboarding,400); return; }
  var isDark=(localStorage.getItem('gyeol_theme')==='dark');
  var src=document.getElementById('bom-char-src');

  document.getElementById('bom').style.display='flex';

  var cap=document.getElementById('bom-cap');
  try{ var p=char.play(); if(p&&p.catch)p.catch(function(){}); }catch(e){}

  _bt(function(){ cw.classList.add('in'); }, 100);
  _bt(function(){ bomCap('안녕하세요'); }, 1000);
  _bt(function(){ bomCap('공간:결의 도우미 봄이예요'); }, 2900);
  _bt(function(){ bomCap('제가 사용법을 간단히 안내해드릴게요'); }, 5000);
  _bt(function(){ cap.classList.remove('show'); }, 7200);
  _bt(function(){ bomEndHello(); }, 7600);
}
function bomCap(t){
  var cap=document.getElementById('bom-cap');
  cap.classList.remove('show');
  _bt(function(){ cap.textContent=t; cap.classList.add('show'); }, 320);
}
function bomEndHello(){
  if(_bomDone) return; _bomDone=true;
  localStorage.setItem('bom_intro_done','1');
  var ov=document.getElementById('bom'); ov.classList.add('fade-out');
  setTimeout(function(){ ov.style.display='none'; startOnboarding(); }, 600);
}
function bomSkip(){
  if(_bomDone) return; _bomDone=true;
  _bomTimers.forEach(clearTimeout); _bomTimers=[];
  localStorage.setItem('bom_intro_done','1');
  var ov=document.getElementById('bom'); ov.classList.add('fade-out');
  setTimeout(function(){ ov.style.display='none'; startOnboarding(); }, 600);
}
