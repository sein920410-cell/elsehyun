        'https://tqhtggusphhcsygiitrv.supabase.co',

    );
    const { data: { session } } = await _authClient.auth.getSession();
    if (!session) { window.location.replace('login.html'); return; }

        .from('serials')

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
input { -webkit-user-select: text; user-select: text; }

body {
  font-family: 'DM Sans','Noto Sans KR',sans-serif;
  background: #FAF7F2; /* 은은한 로즈빛 흰색 */
  min-height: 100dvh;
  color: #2C2C2C; /* 전체 기본 글씨: 차콜 블랙 */
  -webkit-font-smoothing: antialiased;
}

.header {
  padding: 28px 20px 0;
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand { display:flex; align-items:center; gap:7px; 
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
  flex: 1;
  color: #2C2C2C; /* 로고 글씨: 차콜 블랙 */
}
.brand-logo{width:26px;height:26px;object-fit:contain;border-radius:5px;flex-shrink:0}
.header-sub {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #9A8E80; /* 서브 글씨: 따뜻한 회갈색 */
  font-weight: 600;
  text-decoration: underline;
  cursor: pointer;
}

.search-area { padding: 60px 20px 0; }

.hero-text {
  text-align: center;
  margin-bottom: 20px;
}
.hero-title {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
  color: #2C2C2C; /* 큰 제목: 차콜 블랙 */
}
.hero-sub {
  font-size: 13px;
  color: #9A8E80; /* 설명 글씨: 따뜻한 회갈색 */
}

.search-wrap { position: relative; }
.search-icon {
  position: absolute; left: 16px; top: 50%;
  transform: translateY(-50%);
  width: 17px; height: 17px;
  stroke: #9A8E80; /* 돋보기 아이콘: 따뜻한 회갈색 */
  stroke-width: 2; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
  pointer-events: none;
}
.search-input {
  width: 100%;
  background: #fff;
  border: none;
  border-radius: 16px;
  padding: 16px 44px 16px 46px;
  font-size: 15px;
  font-family: inherit;
  color: #2C2C2C; /* 검색어 입력 글씨: 차콜 블랙 */
  outline: none;
  box-shadow: 0 2px 16px rgba(0,0,0,0.08);
  -webkit-appearance: none;
}
.search-input::placeholder { color: #9A8E80; /* 검색창 안내 문구: 따뜻한 회갈색 */ }
.clear-btn {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  width: 26px; height: 26px; border-radius: 50%;
  background: rgba(0,0,0,0.06); border: none;
  color: #9A8E80; /* X 버튼: 따뜻한 회갈색 */
  cursor: pointer;
  font-size: 12px; display: none;
  align-items: center; justify-content: center;
}
.clear-btn.vis { display: flex; }

.result-area { padding: 20px 20px 0; }
.result-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: #9A8E80; /* 결과 텍스트: 따뜻한 회갈색 */
  margin-bottom: 12px;
}

.result-item {
  background: #fff;
  border-radius: 16px;
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 8px; cursor: pointer;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
  transition: transform 0.1s;
}
.result-item:active { transform: scale(0.98); }

.result-ico {
  width: 38px; height: 38px; border-radius: 11px;
  background: rgba(180, 148, 100, 0.12); /* 아이콘 배경: 딥 로즈 골드를 아주 연하게 */
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.result-ico svg {
  width: 18px; height: 18px;
  stroke: #B49464; /* 아이콘 선: 딥 로즈 골드 */
  stroke-width: 1.8; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
}
.result-info { flex: 1; min-width: 0; }
.result-name {
  font-size: 14px; font-weight: 700;
  color: #2C2C2C; /* 결과 물건 이름: 차콜 블랙 */
  letter-spacing: -0.01em;
}
.result-name mark { 
  background: none; 
  color: #B49464; /* 검색된 단어 강조: 딥 로즈 골드 */
  font-weight: 900; 
  text-decoration: underline; 
}
.result-meta { font-size: 11px; color: #9A8E80; margin-top: 3px; } /* 위치 설명: 따뜻한 회갈색 */
.result-meta b { color: #2C2C2C; font-weight: 600; } /* 서랍 이름: 차콜 블랙 */

.go-btn {
  padding: 7px 14px; border-radius: 10px;
  background: #B49464; /* 이동 버튼 배경: 딥 로즈 골드 */
  border: none;
  color: #fff; font-size: 12px; font-weight: 700;
  font-family: inherit; cursor: pointer; white-space: nowrap;
  flex-shrink: 0;
}

.empty-state {
  text-align: center; padding: 60px 20px;
  color: #9A8E80; /* 빈 상태 안내: 따뜻한 회갈색 */ 
  font-size: 14px;
}
.bottom-safe { height: 40px; }

.mypage-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(180, 148, 100, 0.12); /* 마이페이지 배경: 딥 로즈 골드를 연하게 */
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.15s;
}
.mypage-btn:active { background: rgba(180, 148, 100, 0.22); }
.mypage-btn svg {
  width: 17px; height: 17px;
  stroke: #B49464; /* 마이페이지 사람 선: 딥 로즈 골드 */
  stroke-width: 1.8; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
}




/* 온보딩 */
.ob-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9000}
.ob-ov.on{display:block}
.ob-hl{position:fixed;border-radius:10px;outline:3px solid rgba(255,255,255,.9);z-index:9001;pointer-events:none;transition:all .3s}
.ob-box{position:fixed;bottom:100px;left:16px;right:16px;background:#fff;border-radius:16px;padding:18px;z-index:9002;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.ob-nn{font-size:11px;color:#aaa;font-weight:700;margin-bottom:6px}
.ob-tt{font-size:15px;font-weight:800;color:#111;margin-bottom:7px}
.ob-dd{font-size:13px;line-height:1.65;color:#555;white-space:pre-line}
.ob-ww{margin-top:10px;padding:9px 12px;background:rgba(220,38,38,.07);border-radius:8px;font-size:12px;color:#C0362C;font-weight:600;line-height:1.5}
.ob-row{display:flex;gap:8px;margin-top:14px}
.ob-close{padding:10px 14px;background:#eee;border:none;border-radius:9px;font-size:12px;font-weight:600;color:#666;cursor:pointer;font-family:inherit}
.ob-prev{padding:10px 14px;background:#eee;border:none;border-radius:9px;font-size:12px;font-weight:600;color:#444;cursor:pointer;font-family:inherit}
.ob-nxt{flex:1;padding:10px;background:#111;border:none;border-radius:9px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<div class="ob-ov" id="ob-ov" onclick="obClose()">
  <div class="ob-hl" id="ob-hl"></div>
  <div class="ob-box" onclick="event.stopPropagation()">
    <div class="ob-nn" id="ob-nn"></div>
    <div class="ob-tt" id="ob-tt"></div>
    <div class="ob-dd" id="ob-dd"></div>
    <div class="ob-ww" id="ob-ww" style="display:none"></div>
    <div class="ob-row">
      <button class="ob-close" id="ob-close" onclick="obClose()">닫기</button>
      <button class="ob-prev" id="ob-prev" onclick="obPrev()" style="display:none">← 이전</button>
      <button class="ob-nxt" id="ob-nxt" onclick="obNext()">다음 →</button>
    </div>
  </div>
</div>

<script>
function getAllDrawers() {
  const drawers = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key || !key.startsWith('gyeol_')) continue;
    const tag = key.replace('gyeol_', '');
    const raw = localStorage.getItem(key);
    let items = [];
    try { items = JSON.parse(raw) || []; } catch(e) {}
    if (!Array.isArray(items)) continue;
    const name = localStorage.getItem('name_' + tag) || formatTag(tag);
    drawers.push({ tag, name, items });
  }
  return drawers;
}

function formatTag(tag) {
  // 신규 시리얼: GYEOL-1-DR1 → 서랍 1, GYEOL-1-MAIN → 메인
  const mNew = tag.match(/GYEOL-(\d+)-(DR(\d+)|MAIN)/i);
  if (mNew) {
    if (mNew[2].toUpperCase() === 'MAIN') return '메인';
    return '서랍 ' + mNew[3];
  }
  const m = tag.match(/DRAWER0*(\d+)/i);
  if (m) return '서랍 ' + parseInt(m[1]);
  return tag;
}

function highlight(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx)
    + '<mark>' + text.slice(idx, idx + query.length) + '</mark>'
    + text.slice(idx + query.length);
}

function onSearch() {
  const query = document.getElementById('search-input').value.trim();
  const clearBtn = document.getElementById('clear-btn');
  const heroText = document.getElementById('hero-text');
  const resultArea = document.getElementById('result-area');
  const resultLabel = document.getElementById('result-label');
  const resultList = document.getElementById('result-list');

  clearBtn.classList.toggle('vis', query.length > 0);

  if (!query) {
    heroText.style.display = '';
    resultArea.style.display = 'none';
    resultList.innerHTML = '';
    return;
  }

  heroText.style.display = 'none';
  resultArea.style.display = 'block';

  const drawers = getAllDrawers();
  const results = [];
  drawers.forEach(d => {
    d.items.forEach(it => {
      if (!it || !it.n) return;
      let cat = '기타', name = it.n;
      if (it.n.includes(':')) {
        const p = it.n.split(':');
        cat = p[0].trim() || '기타';
        name = p.slice(1).join(':').trim() || p[0];
      }
      if (name.toLowerCase().includes(query.toLowerCase())) {
        results.push({ name, cat, qty: it.q || 1, tag: d.tag, drawerName: d.name });
      }
    });
  });

  resultLabel.textContent = '검색결과 ' + results.length + '건';

  if (!results.length) {
    resultList.innerHTML = '<div class="empty-state"><div style="font-size:36px;margin-bottom:12px">🔍</div>"' + query + '"에 대한 결과가 없어요</div>';
    return;
  }

  resultList.innerHTML = results.map(r => `\n    <div class="result-item" onclick="location.href='drawer.html?tag=${r.tag}'">\n      <div class="result-ico">\n        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>\n      </div>\n      <div class="result-info">\n        <div class="result-name">${highlight(r.name, query)}</div>\n        <div class="result-meta"><b>${r.drawerName}</b> · ${r.cat} · ${r.qty}개</div>\n      </div>\n      <button class="go-btn" onclick="event.stopPropagation();location.href='drawer.html?tag=${r.tag}'">이동</button>\n    </div>\n  `).join('');
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  onSearch();
  document.getElementById('search-input').focus();
}

  document.getElementById('ob-ov').onclick=function(){obClose();};
  obShow(0);
}
function obShow(i){
  var s=_OB_S[i]; if(!s){obDone();return;}
  var el=document.querySelector(s.sel);
  if(!el){_OB_I++;obShow(_OB_I);return;}
  document.getElementById('ob-nn').textContent=(i+1)+' / '+_OB_S.length;
  document.getElementById('ob-tt').textContent=s.title;
  document.getElementById('ob-dd').textContent=s.desc;
  var ww=document.getElementById('ob-ww');
  if(s.warn){ww.textContent=s.warn;ww.style.display='block';}else{ww.style.display='none';}
  document.getElementById('ob-nxt').textContent=i===_OB_S.length-1?'완료 ✓':'다음 →';
  document.getElementById('ob-prev').style.display=i>0?'':'none';
  document.getElementById('ob-close').style.display=i===_OB_S.length-1?'none':'';
  el.scrollIntoView({block:'center',behavior:'smooth'});
  setTimeout(function(){
    var r=el.getBoundingClientRect();
    var hl=document.getElementById('ob-hl');
    hl.style.left=(r.left-5)+'px';
    hl.style.top=(r.top-5)+'px';
    hl.style.width=(r.width+10)+'px';
    hl.style.height=(r.height+10)+'px';
  },350);
}
function obNext(){_OB_I++;obShow(_OB_I);}
function obPrev(){if(_OB_I>0){_OB_I--;obShow(_OB_I);}}
function obDone(){localStorage.setItem(_OB_KEY,'1');obClose();}
function obClose(){
  document.getElementById('ob-ov').classList.remove('on');
  document.getElementById('ob-hl').style.width='0';
  localStorage.setItem(_OB_KEY,'1');
}
function startOnboarding(){
  obStart([
    {sel:'.mypage-btn',title:'마이페이지',desc:'우측 상단 아이콘을 누르면 마이페이지로 이동해요.\nAI 이용권 확인, 테마 설정, 계정 관리를 할 수 있어요.',warn:null},
    {sel:'.search-wrap',title:'통합 검색',desc:'수납장 목록을 등록한 후\n물건 이름을 검색하면 어느 수납장에 있는지 알려줘요.',warn:null}
  ], 'ob_index_done');
}
</script>
