<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공간:결 — SPACE·GYEOL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=Cormorant+Garamond:wght@600&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: radial-gradient(125% 120% at 50% 0%, #F5F1EA 0%, #EBE4D8 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', 'Noto Sans KR', sans-serif;
      padding: 40px 24px;
    }

    /* 브랜드 로고 */
    .brand {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .04em;
      background: linear-gradient(110deg, #A87828, #D4A840, #F0D888, #C89830, #A07020);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      background-size: 200% auto;
      animation: shimmer 8s linear infinite;
      margin-bottom: 48px;
      text-transform: uppercase;
    }

    @keyframes shimmer {
      0%   { background-position: 0% center; }
      50%  { background-position: 100% center; }
      100% { background-position: 0% center; }
    }

    /* 아이콘 원형 */
    .icon-wrap {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: #F1ECE3;
      box-shadow: 8px 8px 20px rgba(176,162,140,0.45), -8px -8px 20px rgba(255,255,255,0.90);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 32px;
    }

    .icon-wrap svg {
      width: 40px;
      height: 40px;
      stroke: #C89830;
      stroke-width: 1.6;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* 텍스트 */
    .title {
      font-size: 22px;
      font-weight: 700;
      color: #3A322A;
      letter-spacing: -.02em;
      margin-bottom: 12px;
      text-align: center;
    }

    .desc {
      font-size: 14px;
      color: #8A7E72;
      line-height: 1.7;
      text-align: center;
      max-width: 280px;
    }

    /* 구분선 */
    .divider {
      width: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #C89830, transparent);
      margin: 32px auto;
      opacity: 0.5;
    }

    /* 오픈 예정 칩 */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      background: #F1ECE3;
      box-shadow: 4px 4px 10px rgba(176,162,140,0.38), -4px -4px 10px rgba(255,255,255,0.82);
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      color: #8A7E72;
      letter-spacing: .02em;
    }

    .chip-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #C89830;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <div class="brand">SPACE · GYEOL</div>

  <div class="icon-wrap">
    <svg viewBox="0 0 24 24">
      <rect x="2" y="3" width="20" height="14" rx="2.5"/>
      <path d="M8 21h8M12 17v4"/>
      <path d="M7 7h4M7 11h6"/>
    </svg>
  </div>

  <div class="title">공간:결</div>
  <div class="desc">스마트 수납장 관리 서비스<br>곧 만나보실 수 있어요.</div>

  <div class="divider"></div>

  <div class="chip">
    <span class="chip-dot"></span>
    서비스 준비 중
  </div>

</body>
</html>
