<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
input { -webkit-user-select: text; user-select: text; }

body {

  background: #FAF7F2; /* 은은한 로즈빛 흰색 */

}

}

.search-area { padding: 60px 20px 0; }

.hero-text {

}

}

.search-wrap { position: relative; }
.search-icon {
  position: absolute; left: 16px; top: 50%;
  transform: translateY(-50%);
  width: 17px; height: 17px;

  stroke-width: 2; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
  pointer-events: none;
}
.search-input {
  width: 100%;
  background: #fff;
  border: none;
  border-radius: 16px;
  padding: 16px 44px 16px 46px;
  font-size: 15px;
  font-family: inherit;
  color: #2C2C2C; /* 검색어 입력 글씨: 차콜 블랙 */
  outline: none;
  box-shadow: 0 2px 16px rgba(0,0,0,0.08);

}
.search-input::placeholder { color: #9A8E80; /* 검색창 안내 문구: 따뜻한 회갈색 */ }
.clear-btn {
  position: absolute; right: 12px; top: 50%;

  width: 26px; height: 26px; border-radius: 50%;

  color: #9A8E80; /* X 버튼: 따뜻한 회갈색 */

}
.clear-btn.vis { display: flex; }

.result-area { padding: 20px 20px 0; }
.result-label {

  letter-spacing: 0.14em; text-transform: uppercase;
  color: #9A8E80; /* 결과 텍스트: 따뜻한 회갈색 */
  margin-bottom: 12px;
}

.result-item {
  background: #fff;
  border-radius: 16px;
  padding: 14px 16px;

  margin-bottom: 8px; cursor: pointer;

}
.result-item:active { transform: scale(0.98); }

.result-ico {
  width: 38px; height: 38px; border-radius: 11px;
  background: rgba(180, 148, 100, 0.12); /* 아이콘 배경: 딥 로즈 골드를 아주 연하게 */
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.result-ico svg {
  width: 18px; height: 18px;
  stroke: #B49464; /* 아이콘 선: 딥 로즈 골드 */
  stroke-width: 1.8; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
}
.result-info { flex: 1; min-width: 0; }
.result-name {

}
.result-name mark { 
  background: none; 
  color: #B49464; /* 검색된 단어 강조: 딥 로즈 골드 */

  text-decoration: underline; 
}

.result-meta b { color: #2C2C2C; font-weight: 600; } /* 서랍 이름: 차콜 블랙 */

.go-btn {
  padding: 7px 14px; border-radius: 10px;
  background: #B49464; /* 이동 버튼 배경: 딥 로즈 골드 */
  border: none;
  color: #fff; font-size: 12px; font-weight: 700;
  font-family: inherit; cursor: pointer; white-space: nowrap;
  flex-shrink: 0;
}

.empty-state {
  text-align: center; padding: 60px 20px;
  color: #9A8E80; /* 빈 상태 안내: 따뜻한 회갈색 */ 
  font-size: 14px;
}
.bottom-safe { height: 40px; }

.mypage-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(180, 148, 100, 0.12); /* 마이페이지 배경: 딥 로즈 골드를 연하게 */
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.15s;
}
.mypage-btn:active { background: rgba(180, 148, 100, 0.22); }
.mypage-btn svg {
  width: 17px; height: 17px;
  stroke: #B49464; /* 마이페이지 사람 선: 딥 로즈 골드 */
  stroke-width: 1.8; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
}
/* ─── 온보딩 ─── */
.ob-ov{display:none;position:fixed;inset:0;z-index:900;pointer-events:none}
.ob-ov.active{display:block;pointer-events:all}
.ob-dim{position:absolute;inset:0;background:rgba(0,0,0,.45)}
.ob-hole{position:absolute;border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.45);z-index:1;pointer-events:none;transition:all .3s cubic-bezier(.32,0,0,1);outline:2.5px solid rgba(255,255,255,.7)}
.ob-card{position:fixed;z-index:910;background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 8px 32px rgba(0,0,0,.22);visibility:hidden;pointer-events:none;bottom:80px;left:12px;right:12px}
.ob-card-arrow.up{position:absolute;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:9px solid #fff;top:-9px;left:24px}
.ob-card-arrow.down{position:absolute;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:9px solid #fff;bottom:-9px;left:24px}
.ob-step{font-size:10px;font-weight:700;color:#aaa;letter-spacing:.08em;margin-bottom:4px}
.ob-title{font-size:14px;font-weight:800;color:#111;margin-bottom:5px;letter-spacing:-.02em}
.ob-desc{font-size:12px;line-height:1.6;color:#555;font-weight:500;white-space:pre-line}
.ob-btns{display:flex;gap:6px;margin-top:12px}
.ob-skip{padding:9px 10px;background:#f2f2f2;border:none;border-radius:8px;font-size:12px;font-weight:600;color:#888;cursor:pointer;font-family:inherit;flex-shrink:0}
.ob-prev{padding:9px 10px;background:#f2f2f2;border:none;border-radius:8px;font-size:12px;font-weight:600;color:#555;cursor:pointer;font-family:inherit;flex-shrink:0}
.ob-next{flex:1;padding:9px;background:#111;border:none;border-radius:8px;font-size:13px;font-weight:700;color:#fff;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<!-- 온보딩 -->
<div class="ob-ov" id="ob-ov">
  <div class="ob-dim"></div>
  <div class="ob-hole" id="ob-hole"></div>
  <div class="ob-card" id="ob-card" onclick="event.stopPropagation()">
    <div id="ob-arrow"></div>
    <div class="ob-step" id="ob-step">1 / 2</div>
    <div class="ob-title" id="ob-title"></div>
    <div class="ob-desc" id="ob-desc"></div>
    <div class="ob-btns">
      <button class="ob-skip" onclick="endOnboarding()">닫기</button>
      <button class="ob-prev" id="ob-prev" onclick="prevStep()" style="display:none">← 이전</button>
      <button class="ob-next" id="ob-next" onclick="nextStep()">다음 →</button>
    </div>
  </div>
</div>

<div class="header">
  <div class="brand">공간:결</div>
  <button class="mypage-btn" onclick="location.href='mypage.html'" title="마이페이지">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
  </button>
</div>

<div class="search-area">
  <div class="hero-text" id="hero-text">
    <div class="hero-title">무엇을 찾으시나요?</div>
    <div class="hero-sub">물건 이름을 입력하면 위치를 알려드려요</div>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search-input" class="search-input" type="text" placeholder="물건 이름으로 검색" autocomplete="off" autocorrect="off" spellcheck="false" oninput="onSearch()">
    <button class="clear-btn" id="clear-btn" onclick="clearSearch()">✕</button>
  </div>
</div>

<div id="result-area" style="display:none" class="result-area">
  <div class="result-label" id="result-label"></div>
  <div id="result-list"></div>
</div>

<div class="bottom-safe"></div>

<script>
function getAllDrawers() {
  const drawers = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key || !key.startsWith('gyeol_')) continue;
    const tag = key.replace('gyeol_', '');
    const raw = localStorage.getItem(key);
    let items = [];
    try { items = JSON.parse(raw) || []; } catch(e) {}
    if (!Array.isArray(items)) continue;
    const name = localStorage.getItem('name_' + tag) || formatTag(tag);
    drawers.push({ tag, name, items });
  }
  return drawers;
}

function formatTag(tag) {
  // 신규 시리얼: GYEOL-1-DR1 → 서랍 1, GYEOL-1-MAIN → 메인
  const mNew = tag.match(/GYEOL-(\d+)-(DR(\d+)|MAIN)/i);
  if (mNew) {
    if (mNew[2].toUpperCase() === 'MAIN') return '메인';
    return '서랍 ' + mNew[3];
  }
  const m = tag.match(/DRAWER0*(\d+)/i);
  if (m) return '서랍 ' + parseInt(m[1]);
  return tag;
}

function highlight(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx)
    + '<mark>' + text.slice(idx, idx + query.length) + '</mark>'
    + text.slice(idx + query.length);
}

function onSearch() {
  const query = document.getElementById('search-input').value.trim();
  const clearBtn = document.getElementById('clear-btn');
  const heroText = document.getElementById('hero-text');
  const resultArea = document.getElementById('result-area');
  const resultLabel = document.getElementById('result-label');
  const resultList = document.getElementById('result-list');

  clearBtn.classList.toggle('vis', query.length > 0);

  if (!query) {
    heroText.style.display = '';
    resultArea.style.display = 'none';
    resultList.innerHTML = '';
    return;
  }

  heroText.style.display = 'none';
  resultArea.style.display = 'block';

  const drawers = getAllDrawers();
  const results = [];
  drawers.forEach(d => {
    d.items.forEach(it => {
      if (!it || !it.n) return;
      let cat = '기타', name = it.n;
      if (it.n.includes(':')) {
        const p = it.n.split(':');
        cat = p[0].trim() || '기타';
        name = p.slice(1).join(':').trim() || p[0];
      }
      if (name.toLowerCase().includes(query.toLowerCase())) {
        results.push({ name, cat, qty: it.q || 1, tag: d.tag, drawerName: d.name });
      }
    });
  });

  resultLabel.textContent = '검색결과 ' + results.length + '건';

  if (!results.length) {
    resultList.innerHTML = '<div class="empty-state"><div style="font-size:36px;margin-bottom:12px">🔍</div>"' + query + '"에 대한 결과가 없어요</div>';
    return;
  }

  resultList.innerHTML = results.map(r => `
    <div class="result-item" onclick="location.href='drawer.html?tag=${r.tag}'">
      <div class="result-ico">
        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </div>
      <div class="result-info">
        <div class="result-name">${highlight(r.name, query)}</div>
        <div class="result-meta"><b>${r.drawerName}</b> · ${r.cat} · ${r.qty}개</div>
      </div>
      <button class="go-btn" onclick="event.stopPropagation();location.href='drawer.html?tag=${r.tag}'">이동</button>
    </div>
  `).join('');
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  onSearch();
  document.getElementById('search-input').focus();
}
async function handleLogout() {
const sb = supabase.createClient(
'https://tqhtggusphhcsygiitrv.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxaHRnZ3VzcGhoY3N5Z2lpdHJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwNDMxMTMsImV4cCI6MjA4NjYxOTExM30.HXA2GbucJPkt3LFl9_JpLiwUQvI95QNEDeQWzQ9i-pc'
);
await sb.auth.signOut();
window.location.replace('login.html');
}

// ─── 온보딩 ───
const INDEX_STEPS=[
  {sel:'.mypage-btn',title:'마이페이지',desc:'우측 상단 아이콘을 누르면 마이페이지로 이동해요.\nAI 이용권 확인, 테마 설정, 계정 관리를 할 수 있어요.',arrow:'down'},
  {sel:'.search-wrap',title:'통합 검색',desc:'수납장 목록을 등록한 후 여기서 물건 이름을 검색하면\n어느 수납장에 있는지 바로 찾아줘요.',arrow:'up'}
];
let _obStep=0;
function startOnboarding(){
  if(localStorage.getItem('ob_index_done')==='1')return;
  _obStep=0;document.getElementById('ob-ov').classList.add('active');
  showObStep(0);
}
function showObStep(i){
  const s=INDEX_STEPS[i];if(!s){endOnboarding();return;}
  const el=document.querySelector(s.sel);if(!el){_obStep++;showObStep(_obStep);return;}
  const card=document.getElementById('ob-card');
  const arr=document.getElementById('ob-arrow');
  if(arr)arr.className='';
  document.getElementById('ob-step').textContent=(i+1)+' / '+INDEX_STEPS.length;
  document.getElementById('ob-title').textContent=s.title;
  document.getElementById('ob-desc').textContent=s.desc;
  const w=document.getElementById('ob-warn');
  if(w){if(s.warn){w.textContent=s.warn;w.style.display='block';}else{w.style.display='none';}}
  document.getElementById('ob-next').textContent=i===INDEX_STEPS.length-1?'완료 ✓':'다음 →';
  const prevBtn=document.getElementById('ob-prev');
  if(prevBtn)prevBtn.style.display=i>0?'block':'none';
  card.style.visibility='visible';
  card.style.pointerEvents='all';
  el.scrollIntoView({block:'center',behavior:'smooth'});
  setTimeout(()=>{
    const r=el.getBoundingClientRect();const pad=6;
    const hole=document.getElementById('ob-hole');
    hole.style.left=(r.left-pad)+'px';hole.style.top=(r.top-pad)+'px';
    hole.style.width=(r.width+pad*2)+'px';hole.style.height=(r.height+pad*2)+'px';
  },100);
}
function nextStep(){_obStep++;showObStep(_obStep);}
function prevStep(){if(_obStep>0){_obStep--;showObStep(_obStep);}}
function endOnboarding(){
  localStorage.setItem('ob_index_done','1');
  const ov=document.getElementById('ob-ov');
  ov.style.opacity='0';setTimeout(()=>{ov.classList.remove('active');ov.style.opacity='';},250);
}
setTimeout(startOnboarding,800);
</script>
</body>
