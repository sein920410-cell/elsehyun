<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
input { -webkit-user-select: text; user-select: text; }

body {
  font-family: 'DM Sans','Noto Sans KR',sans-serif;
  background: linear-gradient(160deg, #1a3a5c 0%, #0f2540 100%);
  min-height: 100dvh;
  color: #fff;
  -webkit-font-smoothing: antialiased;
}

/* HEADER */
.header {
  padding: 28px 20px 0;
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo {
  width: 34px; height: 34px;
  border-radius: 8px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 2.5px;
  background: #0a1e38;
  padding: 3px;
  flex-shrink: 0;
}
.logo-cell { border-radius: 2px; background: #fff; }
.logo-cell.dim { background: rgba(255,255,255,0.2); }
.brand {
  flex: 1;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.brand-accent { color: #52C498; }
.header-sub {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  font-weight: 600;
}

/* SEARCH */
.search-area { padding: 20px 20px 0; }
.search-wrap { position: relative; }
.search-icon {
  position: absolute; left: 16px; top: 50%;
  transform: translateY(-50%);
  width: 17px; height: 17px;
  stroke: rgba(255,255,255,0.3);
  stroke-width: 2; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
  pointer-events: none; transition: stroke 0.2s;
}
.search-wrap:focus-within .search-icon { stroke: #52C498; }
.search-input {
  width: 100%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 16px;
  padding: 15px 44px 15px 46px;
  font-size: 15px;
  font-family: inherit;
  color: #fff;
  outline: none;
  -webkit-appearance: none;
  transition: border-color 0.2s, background 0.2s;
}
.search-input::placeholder { color: rgba(255,255,255,0.28); }
.search-input:focus {
  border-color: rgba(255,255,255,0.22);
  background: rgba(255,255,255,0.11);
}
.clear-btn {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  width: 26px; height: 26px; border-radius: 50%;
  background: rgba(255,255,255,0.1); border: none;
  color: rgba(255,255,255,0.5); cursor: pointer;
  font-size: 12px; display: none;
  align-items: center; justify-content: center;
}
.clear-btn.vis { display: flex; }

/* SECTION LABEL */
.section { padding: 24px 20px 0; }
.section-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(255,255,255,0.3); margin-bottom: 12px;
}

/* DRAWER GRID */
.drawer-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.drawer-card {
  background: #fff;
  border-radius: 18px;
  padding: 18px 16px;
  cursor: pointer;
  box-shadow: 0 4px 24px rgba(0,0,0,0.2);
  text-decoration: none;
  display: block;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s, box-shadow 0.1s;
}
.drawer-card:active {
  transform: scale(0.97);
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.drawer-card-name {
  font-size: 15px; font-weight: 700;
  color: #0f2540; letter-spacing: -0.01em;
  margin-bottom: 6px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.drawer-card-count {
  font-size: 11px; color: #94a3b8;
}
.drawer-card-count b { color: #52C498; font-weight: 700; }
.drawer-card-arrow {
  margin-top: 14px; width: 18px; height: 18px;
  stroke: #cbd5e1; stroke-width: 2; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
}

/* RESULT HEADER */
.result-header { padding: 20px 20px 0; display: none; }
.result-header.vis { display: block; }
.result-count {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(255,255,255,0.3);
}
.result-count b { color: #52C498; }

/* RESULT LIST */
.result-list {
  padding: 12px 20px 0;
  display: flex; flex-direction: column; gap: 8px;
}
.result-item {
  background: #fff;
  border-radius: 16px;
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  transition: transform 0.1s;
}
.result-item:active { transform: scale(0.98); }
.result-ico {
  width: 38px; height: 38px; border-radius: 11px;
  background: rgba(82,196,152,0.12);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.result-ico svg {
  width: 18px; height: 18px;
  stroke: #52C498; stroke-width: 1.8; fill: none;
  stroke-linecap: round; stroke-linejoin: round;
}
.result-info { flex: 1; min-width: 0; }
.result-name {
  font-size: 14px; font-weight: 700;
  color: #0f2540; letter-spacing: -0.01em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.result-name mark { background: none; color: #52C498; }
.result-meta { font-size: 11px; color: #94a3b8; margin-top: 3px; }
.result-meta b { color: #64748b; font-weight: 600; }
.go-btn {
  flex-shrink: 0;
  padding: 7px 14px; border-radius: 10px;
  background: #0f2540; border: none;
  color: #fff; font-size: 12px; font-weight: 700;
  font-family: inherit; cursor: pointer; white-space: nowrap;
}

/* EMPTY */
.empty-state { padding: 60px 20px; text-align: center; display: none; }
.empty-state.vis { display: block; }
.empty-txt { font-size: 14px; color: rgba(255,255,255,0.3); margin-top: 8px; }
.empty-kw { color: rgba(255,255,255,0.5); font-weight: 600; }

.bottom-safe { height: 40px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-cell"></div>
    <div class="logo-cell"></div>
    <div class="logo-cell"></div>
    <div class="logo-cell dim"></div>
  </div>
  <div class="brand">공간<span class="brand-accent">:</span>결</div>
  <div class="header-sub">Smart Storage</div>
</div>

<div class="search-area">
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search-input" class="search-input" type="text" placeholder="물건 이름으로 검색" autocomplete="off" autocorrect="off" spellcheck="false" oninput="onSearch()">
    <button class="clear-btn" id="clear-btn" onclick="clearSearch()">✕</button>
  </div>
</div>

<!-- 서랍 목록 -->
<div class="section" id="drawer-section">
  <div class="section-label">내 서랍 목록</div>
  <div class="drawer-grid" id="drawer-grid"></div>
</div>

<!-- 검색 결과 -->
<div class="result-header" id="result-header">
  <div class="result-count" id="result-count"></div>
</div>
<div class="result-list" id="result-list"></div>

<!-- 결과 없음 -->
<div class="empty-state" id="empty-state">
  <div style="font-size:36px">🔍</div>
  <div class="empty-txt"><span class="empty-kw" id="empty-kw"></span>에 대한 결과가 없어요</div>
</div>

<div class="bottom-safe"></div>

<script>
function getAllDrawers() {
  const drawers = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key || !key.startsWith('gyeol_')) continue;
    const tag = key.replace('gyeol_', '');
    // 오래된 테스트 키 제외 (v3_ 등 prefix 있는 것)
    if (tag.includes('_') && !tag.startsWith('DRAWER')) continue;
    const raw = localStorage.getItem(key);
    let items = [];
    try { items = JSON.parse(raw) || []; } catch(e) {}
    if (!Array.isArray(items)) continue;
    const name = localStorage.getItem('name_' + tag) || tag;
    drawers.push({ tag, name, count: items.length, items });
  }
  drawers.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
  return drawers;
}

function renderDrawers() {
  const drawers = getAllDrawers();
  const grid = document.getElementById('drawer-grid');
  if (!drawers.length) {
    grid.innerHTML = '<div style="color:rgba(255,255,255,0.25);font-size:13px;padding:8px 0;grid-column:1/-1;">등록된 서랍이 없습니다</div>';
    return;
  }
  grid.innerHTML = drawers.map(d => `
    <a class="drawer-card" href="drawer.html?tag=${d.tag}">
      <div class="drawer-card-name">${d.name}</div>
      <div class="drawer-card-count"><b>${d.count}</b> 종류</div>
      <svg class="drawer-card-arrow" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </a>
  `).join('');
}

function highlight(text, query) {
  if (!query) return text;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return text;
  return text.slice(0, idx)
    + '<mark>' + text.slice(idx, idx + query.length) + '</mark>'
    + text.slice(idx + query.length);
}

function onSearch() {
  const query = document.getElementById('search-input').value.trim();
  const clearBtn = document.getElementById('clear-btn');
  const drawerSection = document.getElementById('drawer-section');
  const resultHeader = document.getElementById('result-header');
  const resultList = document.getElementById('result-list');
  const emptyState = document.getElementById('empty-state');

  clearBtn.classList.toggle('vis', query.length > 0);

  if (!query) {
    drawerSection.style.display = '';
    resultHeader.classList.remove('vis');
    resultList.innerHTML = '';
    emptyState.classList.remove('vis');
    return;
  }

  drawerSection.style.display = 'none';

  const drawers = getAllDrawers();
  const results = [];
  drawers.forEach(d => {
    d.items.forEach(it => {
      if (!it || !it.n) return;
      let cat = '기타', name = it.n;
      if (it.n.includes(':')) {
        const p = it.n.split(':');
        cat = p[0].trim() || '기타';
        name = p.slice(1).join(':').trim() || p[0];
      }
      if (name.toLowerCase().includes(query.toLowerCase())) {
        results.push({ name, cat, qty: it.q || 1, tag: d.tag, drawerName: d.name });
      }
    });
  });

  document.getElementById('result-count').innerHTML = `검색결과 <b>${results.length}</b>건`;
  resultHeader.classList.add('vis');

  if (!results.length) {
    resultList.innerHTML = '';
    document.getElementById('empty-kw').textContent = '"' + query + '"';
    emptyState.classList.add('vis');
    return;
  }

  emptyState.classList.remove('vis');
  resultList.innerHTML = results.map(r => `
    <div class="result-item" onclick="location.href='drawer.html?tag=${r.tag}'">
      <div class="result-ico">
        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </div>
      <div class="result-info">
        <div class="result-name">${highlight(r.name, query)}</div>
        <div class="result-meta"><b>${r.drawerName}</b> · ${r.cat} · ${r.qty}개</div>
      </div>
      <button class="go-btn" onclick="event.stopPropagation(); location.href='drawer.html?tag=${r.tag}'">이동</button>
    </div>
  `).join('');
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  onSearch();
  document.getElementById('search-input').focus();
}

renderDrawers();
</script>
</body>
</html>
