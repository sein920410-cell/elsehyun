<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>공간:결 - 로그인</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>body { font-family: 'Pretendard', sans-serif; background-color: #0C1220; color: white; }</style>
</head>
<body>
    <div class="max-w-sm mx-auto min-h-screen flex flex-col justify-center px-6">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold tracking-tight">공간:결</h1>
            <p class="text-gray-400 text-sm mt-2">공간의 결을 더하다</p>
        </div>
        <div class="bg-gray-800 rounded-2xl p-8 space-y-5">

            <!-- 구글 로그인 버튼 -->
            <button id="google-btn" onclick="handleGoogle()"
                class="w-full bg-white hover:bg-gray-100 text-gray-800 font-semibold py-3 rounded-xl transition text-sm flex items-center justify-center gap-3">
                <svg width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                </svg>
                Google로 로그인
            </button>

            <!-- 구분선 -->
            <div class="flex items-center gap-3">
                <div class="flex-1 h-px bg-gray-600"></div>
                <span class="text-gray-500 text-xs">또는</span>
                <div class="flex-1 h-px bg-gray-600"></div>
            </div>

            <!-- 이메일 로그인 -->
            <div>
                <label class="block text-sm text-gray-400 mb-1">이메일</label>
                <input id="email" type="email" placeholder="이메일"
                    class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white text-sm outline-none focus:border-blue-500 transition">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">비밀번호</label>
                <input id="password" type="password" placeholder="비밀번호"
                    class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white text-sm outline-none focus:border-blue-500 transition">
            </div>
            <div id="error-msg" class="text-red-400 text-sm text-center hidden"></div>
            <button id="login-btn" onclick="handleLogin()"
                class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl transition text-sm">
                이메일로 로그인
            </button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const supabase = createClient(
            'https://tqhtggusphhcsygiitrv.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxaHRnZ3VzcGhoY3N5Z2lpdHJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwNDMxMTMsImV4cCI6MjA4NjYxOTExM30.HXA2GbucJPkt3LFl9_JpLiwUQvI95QNEDeQWzQ9i-pc'
        );

        // 구글 로그인
        window.handleGoogle = async () => {
            const btn = document.getElementById('google-btn');
            btn.textContent = '연결 중...';
            btn.disabled = true;
            await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: 'https://qr-test-sage.vercel.app/serial.html' }
            });
        };

        // 이메일 로그인
        window.handleLogin = async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errEl = document.getElementById('error-msg');
            const btn = document.getElementById('login-btn');
            errEl.classList.add('hidden'); btn.textContent = '로그인 중...'; btn.disabled = true;
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                errEl.textContent = '로그인 실패'; errEl.classList.remove('hidden'); btn.textContent = '이메일로 로그인'; btn.disabled = false;
            } else {
                // serials 테이블로 확인 (다른 페이지 인증가드와 통일)
                const { data: s } = await supabase.from('serials').select('id').eq('used_by', data.user.email).maybeSingle();
                if (s) { window.location.replace('index.html'); } else { window.location.replace('serial.html'); }
            }
        };

        document.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleLogin(); });
    </script>
</body>
</html>
