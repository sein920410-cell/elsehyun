<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>공간:결 - 스마트 수납 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #111827; color: white; }
        /* 로딩 중 화면 가리기 (로그인 체크 전까지) */
        #auth-overlay { position: fixed; inset: 0; background: #111827; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        // 1. 세인 님의 Supabase 정보 입력 (Vercel 환경변수와 동일하게 설정)
        const SUPABASE_URL = 'https://tqhtggusphhcsygiitrv.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxaHRnZ3VzcGhoY3N5Z2lpdHJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwNDMxMTMsImV4cCI6MjA4NjYxOTExM30.HXA2GbucJPkt3LFl9_JpLiwUQvI95QNEDeQWzQ9i-pc'; 
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        async function checkAuth() {
            try {
                const { data: { session }, error } = await supabase.auth.getSession();
                
                // 로그인 세션이 없거나 에러가 나면 로그인 페이지로 퇴출
                if (error || !session) {
                    window.location.replace("login.html"); 
                    return;
                }

                // 로그인 확인 완료 시 로딩 화면 제거
                document.getElementById('auth-overlay').style.opacity = '0';
                setTimeout(() => document.getElementById('auth-overlay').remove(), 300);
                
                console.log("환영합니다, " + session.user.email + " 님!");
            } catch (e) {
                window.location.replace("login.html");
            }
        }

        // 페이지 로드와 동시에 실행
        checkAuth();
    </script>
</head>
<body>
    <div id="auth-overlay">
        <div class="text-xl font-bold animate-pulse">보안 연결 중...</div>
    </div>

    <div class="max-w-md mx-auto min-h-screen pb-24">
        <header class="p-6 flex justify-between items-center">
            <h1 class="text-2xl font-bold">공간:결</h1>
            <button onclick="handleLogout()" class="text-sm text-gray-400 underline">로그아웃</button>
        </header>

        <main class="px-6">
            <div class="bg-gray-800 rounded-2xl p-8 text-center border-2 border-dashed border-gray-700">
                <p class="text-gray-400">서랍을 촬영하여 물건을 등록하세요.</p>
            </div>
        </main>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const supabase = createClient('세인님의_SUPABASE_URL', '세인님의_SUPABASE_ANON_KEY');

        // 로그아웃 기능
        window.handleLogout = async () => {
            await supabase.auth.signOut();
            window.location.replace("login.html");
        }
    </script>
</body>
</html>
