<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>공간:결 - 시리얼 번호 등록</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f0efeb;
            --card: #FFFFFF;
            --field: #f6f4f0;
            --surface2: #FFFFFF;
            --accent: #a89275;
            --text: #333333;
            --sub: #91857c;
            --muted: #826f5b;
            --nm-raise-sm: 5px 5px 12px rgba(170,165,155,0.36), -5px -5px 12px rgba(255,255,255,0.95);
            --nm-inset-sm: inset 2px 2px 5px rgba(170,165,155,0.42), inset -2px -2px 5px rgba(255,255,255,0.95);
            --nm-inset: inset 4px 4px 9px rgba(170,165,155,0.48), inset -4px -4px 9px rgba(255,255,255,0.95);
        }
        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px 20px;
        }
        .container { width: 100%; max-width: 380px; }
        .logo-area { text-align: center; margin-bottom: 28px; }
        /* 로고 글자: '공간:결' 텍스트 + 골드 그라데이션 + shimmer (이미지 X → 잘림 없음) */
        .logo-gyeol {
            font-family: 'Noto Serif KR', serif;
            font-weight: 600;
            font-size: 32px;
            line-height: 1.3;
            display: inline-block;
            padding-bottom: 5px;
            background: linear-gradient(105deg,#6E4E1C,#A8863E 28%,#D8B868 50%,#A8863E 72%,#6E4E1C);
            background-size: 220% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            animation: gyeol-shimmer 7s ease-in-out infinite;
        }
        @keyframes gyeol-shimmer {
            0%   { background-position: 0% center; }
            50%  { background-position: 100% center; }
            100% { background-position: 0% center; }
        }
        .logo-brand {
            font-family: 'Pretendard', sans-serif;
            font-size: 12px;
            letter-spacing: 0.24em;
            color: var(--muted);
            margin-top: 2px;
        }
        .logo-divider {
            width: 30px; height: 1px;
            background: rgba(168,138,62,0.45);
            margin: 8px auto 0;
        }
        .logo-sub { font-size: 14px; color: var(--sub); margin-top: 8px; font-family: 'Noto Serif KR', serif; }
        .nm-card {
            background: var(--card);
            border-radius: 24px;
            padding: 24px 20px;
            box-shadow: -3px -3px 8px rgba(255,255,255,0.92), 0 12px 30px rgba(150,145,135,0.20);
        }
        .field-wrap { margin-bottom: 16px; }
        .field-label {
            display: block;
            font-size: 12px;
            color: var(--sub);
            margin-bottom: 6px;
            padding-left: 2px;
        }
        .nm-input {
            width: 100%;
            background: var(--field);
            border: none;
            border-radius: 14px;
            box-shadow: var(--nm-inset-sm);
            padding: 13px 14px;
            font-size: 14px;
            color: var(--text);
            font-family: 'Pretendard', sans-serif;
            outline: none;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            transition: box-shadow .2s;
        }
        .nm-input::placeholder { color: var(--sub); opacity: 0.5; letter-spacing: 0; text-transform: none; }
        .nm-input:focus { box-shadow: var(--nm-inset), 0 0 0 2px rgba(200,168,112,0.25); }
        .msg { font-size: 12px; text-align: center; margin-bottom: 12px; }
        .error-msg { color: #E07070; }
        .success-msg { color: #7EC87E; }
        .submit-btn {
            width: 100%;
            background: #1f2521;
            color: #d8d0b6;
            border: none;
            border-radius: 18px;
            padding: 15px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Pretendard', sans-serif;
            box-shadow: 5px 5px 12px rgba(170,165,155,0.36), -5px -5px 12px rgba(255,255,255,0.95);
            transition: opacity .15s;
            margin-bottom: 12px;
        }
        .submit-btn:active { opacity: 0.85; }
        .submit-btn:disabled { opacity: 0.4; cursor: default; }
        .logout-btn {
            width: 100%;
            background: none;
            border: none;
            color: var(--sub);
            font-size: 12px;
            cursor: pointer;
            font-family: 'Pretendard', sans-serif;
            padding: 6px;
            opacity: 0.6;
            transition: opacity .15s;
        }
        .logout-btn:hover { opacity: 1; }
        .site-footer { text-align: center; margin-top: 38px; padding-top: 22px; border-top: 1px solid rgba(168,138,62,0.20); }
        .footer-brand { display: inline-flex; align-items: center; justify-content: center; gap: 9px; }
        .footer-logo { display: inline-block; width: 22px; }
        .footer-logo img { width: 100%; display: block; opacity: 0.92; }
        .footer-brand-name { font-family: 'Pretendard', sans-serif; font-size: 13px; letter-spacing: 0.2em; color: var(--muted); }
        .footer-meta { font-size: 12px; color: var(--sub); margin-top: 14px; }
        .footer-copy { font-size: 11px; color: var(--sub); opacity: 0.8; margin-top: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-area">
            <span class="logo-gyeol">공간:결</span>
            <p class="logo-brand">ELSEHYUN</p>
            <div class="logo-divider"></div>
            <p class="logo-sub">제품 시리얼 번호를 등록해주세요</p>
        </div>
        <div class="nm-card">
            <div class="field-wrap">
                <label class="field-label" for="serial">시리얼 번호</label>
                <input id="serial" type="text" class="nm-input" placeholder="시리얼 번호를 입력하세요">
            </div>
            <div id="error-msg" class="msg error-msg" style="display:none"></div>
            <div id="success-msg" class="msg success-msg" style="display:none"></div>
            <button id="submit-btn" type="button" class="submit-btn">등록하기</button>
            <button id="logout-btn" type="button" class="logout-btn">로그아웃</button>
        </div>
    </div>
    <footer class="site-footer">
        <span class="footer-brand">
            <span class="footer-logo"><img src="lib/logo-es-gold.png" alt="ELSEHYUN"></span>
            <span class="footer-brand-name">ELSEHYUN</span>
        </span>
        <p class="footer-meta">문의 on@elsehyun.com</p>
        <p class="footer-copy">© 2026 엘세현 (ELSEHYUN). All rights reserved.</p>
    </footer>

    <script src="lib/supabase.umd.min.js"></script>
    <script type="module">
        const { createClient } = window.supabase;
        const supabase = createClient(
            'https://tqhtggusphhcsygiitrv.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxaHRnZ3VzcGhoY3N5Z2lpdHJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwNDMxMTMsImV4cCI6MjA4NjYxOTExM30.HXA2GbucJPkt3LFl9_JpLiwUQvI95QNEDeQWzQ9i-pc',
            { auth: { storage: window.localStorage, persistSession: true, autoRefreshToken: true, detectSessionInUrl: true } }
        );

        let currentSession = null;

        const { data: { session } } = await supabase.auth.getSession();

        if (!session) {
            window.location.replace('login.html');
        } else {
            currentSession = session;
        }

        // ── 진입 자동처리 (재로그인 패스 등)는 별도로 실행 ──
        // ⚠️ 버튼/로그아웃/Enter 리스너는 이 함수보다 "먼저" 등록되어,
        //    진입 조회가 느리거나 막혀도 등록 버튼은 항상 동작한다. (버튼 먹통 방지)
        async function handleEntry() {
            if (!session) return;
            const params = new URLSearchParams(window.location.search);
            const urlCode = params.get('code');
            const isAdd = params.get('add') === 'true';
            const isRegister = params.get('register') === '1';

            // 단품 코드가 URL에 있으면 입력창에 자동 채움 (편의)
            if (urlCode && urlCode.toUpperCase().startsWith('GYEOL-S-')) {
                document.getElementById('serial').value = urlCode.toUpperCase();
                return;
            }
            if (isAdd) return; // 추가 등록이면 폼 그대로
            // tag.html에서 "미등록 태그를 등록하러" 넘어온 경우(register=1):
            // 과거 등록 이력이 있어도 자동 통과(search)시키지 않고 시리얼 입력을 강제한다.
            // (이 가드가 없으면 기존 등록자가 새 태그를 찍었을 때 입력 화면을 건너뛰고
            //  검색창으로 튕겨, 신규 태그 등록 자체가 불가능해진다.)
            if (isRegister) return;

            // ── 재로그인/소셜로그인 후 도착한 경우: 시리얼 재입력 없이 통과 ──
            // ⚠️ 통과 목적지는 반드시 재검증되는 경로여야 함:
            //   · gyeol_after_login(원래 가려던 태그) → tag.html이 serial_codes로 재검증
            //     → 미등록 태그면 거기서 막힘. 따라서 무단 진입 불가.
            //   · 등록 이력자 → search.html (본인 수납장만 user_email로 조회)
            // 시리얼은 최초 1회만 등록. 이미 등록한 사람이 매번 입력하지 않도록 한다.
            const afterLogin = localStorage.getItem('gyeol_after_login');
            if (afterLogin) {
                localStorage.removeItem('gyeol_after_login');
                window.location.replace(afterLogin);
                return;
            }
            // 등록 이력이 있으면(패키지 또는 단품) 시리얼 화면 건너뛰고 검색으로
            try {
                const { data: pkgRows } = await supabase
                    .from('serials').select('id').eq('used_by', session.user.email).limit(1);
                const { data: snglRows } = await supabase
                    .from('single_serials').select('id').eq('used_by', session.user.email).limit(1);
                if ((pkgRows && pkgRows.length) || (snglRows && snglRows.length)) {
                    window.location.replace('search.html');
                    return;
                }
            } catch (e) {
                // 진입 조회 실패해도 폼은 그대로 노출 → 사용자가 직접 등록 가능
                console.warn('진입 자동처리 조회 실패(무시):', e);
            }
            // 등록 이력 없음 → 폼 그대로 표시 (시리얼 입력 강제, 신규 등록)
        }

        document.getElementById('submit-btn').addEventListener('click', async () => {
            const session = currentSession;
            const code = document.getElementById('serial').value.trim().toUpperCase();
            const errEl = document.getElementById('error-msg');
            const sucEl = document.getElementById('success-msg');
            const btn = document.getElementById('submit-btn');

            errEl.style.display = 'none';
            sucEl.style.display = 'none';

            if (!code) {
                errEl.textContent = '시리얼 번호를 입력해주세요.';
                errEl.style.display = 'block';
                return;
            }
            if (!session) {
                window.location.replace('login.html');
                return;
            }

            btn.textContent = '확인 중...';
            btn.disabled = true;

            const now = new Date().toISOString();

            // ── 단품 코드 (GYEOL-S-) ──────────────────────────────
            if (code.startsWith('GYEOL-S-')) {
                const { data: rows, error: sErr } = await supabase
                    .from('single_serials')
                    .select('*')
                    .eq('serial_code', code)
                    .is('used_by', null)
                    .limit(1);

                const single = rows?.[0];

                if (sErr || !single) {
                    errEl.textContent = '유효하지 않은 시리얼 번호예요. 다시 확인해주세요.';
                    errEl.style.display = 'block';
                    btn.textContent = '등록하기';
                    btn.disabled = false;
                    return;
                }

                const { error: upErr } = await supabase
                    .from('single_serials')
                    .update({ used_by: session.user.email, used_at: now })
                    .eq('serial_code', code);

                if (upErr) {
                    errEl.textContent = '등록 중 오류가 발생했어요. 다시 시도해주세요.';
                    errEl.style.display = 'block';
                    btn.textContent = '등록하기';
                    btn.disabled = false;
                    return;
                }

                sucEl.textContent = '등록 완료! 잠시 후 이동합니다.';
                sucEl.style.display = 'block';
                btn.textContent = '완료';
                setTimeout(() => { window.location.replace(`drawer.html?tag=GYEOL-S-${single.item_number}`); }, 1500);
                return;
            }

            // ── 패키지 코드 ───────────────────────────────────────
            const { data: rows2, error } = await supabase
                .from('serials')
                .select('*')
                .eq('serial_code', code)
                .limit(1);

            const serial = rows2?.[0];

            if (error || !serial) {
                errEl.textContent = '유효하지 않은 시리얼 번호예요. 다시 확인해주세요.';
                errEl.style.display = 'block';
                btn.textContent = '등록하기';
                btn.disabled = false;
                return;
            }

            // ── 14일 유예 / 잠금 체크 ────────────────────────────
            if (serial.deleted_at) {
                const deletedAt = new Date(serial.deleted_at);
                const daysPassed = (new Date() - deletedAt) / (1000 * 60 * 60 * 24);
                if (daysPassed >= 14) {
                    errEl.textContent = '이미 사용 이력이 있는 시리얼 번호예요. 고객센터로 문의해주세요.';
                    errEl.style.display = 'block';
                    btn.textContent = '등록하기';
                    btn.disabled = false;
                    return;
                }
                if (serial.original_owner !== session.user.email) {
                    errEl.textContent = '이미 사용 이력이 있는 시리얼 번호예요. 본인 계정으로 로그인 후 다시 시도해주세요.';
                    errEl.style.display = 'block';
                    btn.textContent = '등록하기';
                    btn.disabled = false;
                    return;
                }
                // 14일 이내 + 본인 이메일 → 복구 허용 (아래로 계속)
            } else if (serial.used_by) {
                errEl.textContent = '이미 등록된 시리얼 번호예요.';
                errEl.style.display = 'block';
                btn.textContent = '등록하기';
                btn.disabled = false;
                return;
            }

            const setNum = serial.set_number;
            const tagCodes = [
                `GYEOL-${setNum}-MAIN`,
                `GYEOL-${setNum}-DR1`,
                `GYEOL-${setNum}-DR2`
            ];

            const { error: tagError } = await supabase
                .from('serial_codes')
                .update({ used_by: session.user.email, used_at: now })
                .in('code', tagCodes);

            if (tagError) {
                errEl.textContent = '등록 중 오류가 발생했어요. 다시 시도해주세요.';
                errEl.style.display = 'block';
                btn.textContent = '등록하기';
                btn.disabled = false;
                return;
            }

            await supabase
                .from('serials')
                .update({ used_by: session.user.email, used_at: now, deleted_at: null, original_owner: null })
                .eq('serial_code', code);

            sucEl.textContent = '등록 완료! 잠시 후 이동합니다.';
            sucEl.style.display = 'block';
            btn.textContent = '완료';
            const afterLogin = localStorage.getItem('gyeol_after_login');
            if (afterLogin) {
                localStorage.removeItem('gyeol_after_login');
                setTimeout(() => { window.location.replace(afterLogin); }, 1500);
            } else {
                setTimeout(() => { window.location.replace('search.html'); }, 1500);
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.replace('login.html');
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('submit-btn').click();
            }
        });

        // 리스너 등록이 끝난 뒤 진입 자동처리 실행 (버튼은 이미 살아있음)
        handleEntry();
    </script>
</body>
</html>
