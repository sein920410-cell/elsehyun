<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>공간:결 - 등록</title><script src="https://cdn.tailwindcss.com"></script>
    <style>body { background-color: #0C1220; color: white; }</style>
</head>
<body>
    <div class="max-w-sm mx-auto min-h-screen flex flex-col justify-center px-6">
        <div class="text-center mb-8"><h2 class="text-2xl font-bold">제품 인증</h2><p class="text-gray-400 text-sm mt-2">시리얼 번호를 입력하세요.</p></div>
        <div class="bg-gray-800 rounded-2xl p-8 space-y-5">
            <input id="serial-input" type="text" placeholder="예: MY-BOSS-01" class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white text-center font-mono outline-none focus:border-green-500 transition">
            <div id="msg" class="text-sm text-center hidden"></div>
            <button onclick="checkSerial()" class="w-full bg-green-600 text-white font-semibold py-3 rounded-xl">인증하기</button>
        </div>
    </div>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const supabase = createClient('https://tqhtggusphhcsygiitrv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxaHRnZ3VzcGhoY3N5Z2lpdHJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwNDMxMTMsImV4cCI6MjA4NjYxOTExM30.HXA2GbucJPkt3LFl9_JpLiwUQvI95QNEDeQWzQ9i-pc');
        window.checkSerial = async () => {
            const code = document.getElementById('serial-input').value.trim();
            const { data: { session: s } } = await supabase.auth.getSession();
            const { data: d } = await supabase.from('serial_codes').select('*').eq('code', code).eq('is_used', false).single();
            if (d) {
                await supabase.from('serial_codes').update({ is_used: true, used_by: s.user.email }).eq('code', code);
                document.getElementById('msg').textContent = "✅ 인증 성공!"; document.getElementById('msg').classList.remove('hidden');
                setTimeout(() => window.location.replace('drawer.html'), 1000);
            } else {
                document.getElementById('msg').textContent = "❌ 잘못된 번호입니다."; document.getElementById('msg').classList.remove('hidden');
            }
        };
    </script>
</body>
</html>
