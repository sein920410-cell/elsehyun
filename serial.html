    <script src="lib/supabase.umd.min.js"></script>
    <script type="module">
        const { createClient } = window.supabase;
        const supabase = createClient(
            'https://tqhtggusphhcsygiitrv.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxaHRnZ3VzcGhoY3N5Z2lpdHJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwNDMxMTMsImV4cCI6MjA4NjYxOTExM30.HXA2GbucJPkt3LFl9_JpLiwUQvI95QNEDeQWzQ9i-pc',
            { auth: { storage: window.localStorage, persistSession: true, autoRefreshToken: true, detectSessionInUrl: true } }
        );

        let currentSession = null;

        const { data: { session } } = await supabase.auth.getSession();

        if (!session) {
            window.location.replace('login.html');
        } else {
            currentSession = session;
            const params = new URLSearchParams(window.location.search);
            const urlCode = params.get('code');
            const isAdd = params.get('add') === 'true';

            // 단품 코드가 URL에 있으면 입력창에 자동 채움 (편의)
            if (urlCode && urlCode.toUpperCase().startsWith('GYEOL-S-')) {
                document.getElementById('serial').value = urlCode.toUpperCase();
            }
            // 추가 등록(isAdd) 또는 단품 코드 진입이면 폼을 그대로 표시하고 시리얼 입력 받음.
            else if (!isAdd) {
                // ── 재로그인/소셜로그인 후 도착한 경우: 시리얼 재입력 없이 통과 ──
                // ⚠️ 통과 목적지는 반드시 재검증되는 경로여야 함:
                //   · gyeol_after_login(원래 가려던 태그) → tag.html이 serial_codes로 재검증
                //     → 미등록 태그면 거기서 막힘. 따라서 무단 진입 불가.
                //   · 등록 이력자 → search.html (본인 수납장만 user_email로 조회)
                // 시리얼은 최초 1회만 등록. 이미 등록한 사람이 매번 입력하지 않도록 한다.
                const afterLogin = localStorage.getItem('gyeol_after_login');
                if (afterLogin) {
                    localStorage.removeItem('gyeol_after_login');
                    window.location.replace(afterLogin);
                    return;
                }
                // 등록 이력이 있으면(패키지 또는 단품) 시리얼 화면 건너뛰고 검색으로
                const { data: pkgRows } = await supabase
                    .from('serials').select('id').eq('used_by', session.user.email).limit(1);
                const { data: snglRows } = await supabase
                    .from('single_serials').select('id').eq('used_by', session.user.email).limit(1);
                if ((pkgRows && pkgRows.length) || (snglRows && snglRows.length)) {
                    window.location.replace('search.html');
                    return;
                }
                // 등록 이력 없음 → 폼 그대로 표시 (시리얼 입력 강제, 신규 등록)
            }
        }

        document.getElementById('submit-btn').addEventListener('click', async () => {
            const session = currentSession;
            const code = document.getElementById('serial').value.trim().toUpperCase();
            const errEl = document.getElementById('error-msg');
            const sucEl = document.getElementById('success-msg');
            const btn = document.getElementById('submit-btn');

            errEl.style.display = 'none';
            sucEl.style.display = 'none';

            if (!code) {
                errEl.textContent = '시리얼 번호를 입력해주세요.';
                errEl.style.display = 'block';
                return;
            }
            if (!session) {
                window.location.replace('login.html');
                return;
            }

            btn.textContent = '확인 중...';
            btn.disabled = true;

            const now = new Date().toISOString();

            // ── 단품 코드 (GYEOL-S-) ──────────────────────────────
            if (code.startsWith('GYEOL-S-')) {
                const { data: rows, error: sErr } = await supabase
                    .from('single_serials')
                    .select('*')
                    .eq('serial_code', code)
                    .is('used_by', null)
                    .limit(1);

                const single = rows?.[0];

                if (sErr || !single) {
                    errEl.textContent = '유효하지 않은 시리얼 번호예요. 다시 확인해주세요.';
                    errEl.style.display = 'block';
                    btn.textContent = '등록하기';
                    btn.disabled = false;
                    return;
                }

                const { error: upErr } = await supabase
                    .from('single_serials')
                    .update({ used_by: session.user.email, used_at: now })
                    .eq('serial_code', code);

                if (upErr) {
                    errEl.textContent = '등록 중 오류가 발생했어요. 다시 시도해주세요.';
                    errEl.style.display = 'block';
                    btn.textContent = '등록하기';
                    btn.disabled = false;
                    return;
                }

                sucEl.textContent = '등록 완료! 잠시 후 이동합니다.';
                sucEl.style.display = 'block';
                btn.textContent = '완료';
                setTimeout(() => { window.location.replace(`drawer.html?tag=GYEOL-S-${single.item_number}`); }, 1500);
                return;
            }

            // ── 패키지 코드 ───────────────────────────────────────
            const { data: rows2, error } = await supabase
                .from('serials')
                .select('*')
                .eq('serial_code', code)
                .limit(1);

            const serial = rows2?.[0];

            if (error || !serial) {
                errEl.textContent = '유효하지 않은 시리얼 번호예요. 다시 확인해주세요.';
                errEl.style.display = 'block';
                btn.textContent = '등록하기';
                btn.disabled = false;
                return;
            }

            // ── 14일 유예 / 잠금 체크 ────────────────────────────
            if (serial.deleted_at) {
                const deletedAt = new Date(serial.deleted_at);
                const daysPassed = (new Date() - deletedAt) / (1000 * 60 * 60 * 24);
                if (daysPassed >= 14) {
                    errEl.textContent = '이미 사용 이력이 있는 시리얼 번호예요. 고객센터로 문의해주세요.';
                    errEl.style.display = 'block';
                    btn.textContent = '등록하기';
                    btn.disabled = false;
                    return;
                }
                if (serial.original_owner !== session.user.email) {
                    errEl.textContent = '이미 사용 이력이 있는 시리얼 번호예요. 본인 계정으로 로그인 후 다시 시도해주세요.';
                    errEl.style.display = 'block';
                    btn.textContent = '등록하기';
                    btn.disabled = false;
                    return;
                }
                // 14일 이내 + 본인 이메일 → 복구 허용 (아래로 계속)
            } else if (serial.used_by) {
                errEl.textContent = '이미 등록된 시리얼 번호예요.';
                errEl.style.display = 'block';
                btn.textContent = '등록하기';
                btn.disabled = false;
                return;
            }

            const setNum = serial.set_number;
            const tagCodes = [
                `GYEOL-${setNum}-MAIN`,
                `GYEOL-${setNum}-DR1`,
                `GYEOL-${setNum}-DR2`
            ];

            const { error: tagError } = await supabase
                .from('serial_codes')
                .update({ used_by: session.user.email, used_at: now })
                .in('code', tagCodes);

            if (tagError) {
                errEl.textContent = '등록 중 오류가 발생했어요. 다시 시도해주세요.';
                errEl.style.display = 'block';
                btn.textContent = '등록하기';
                btn.disabled = false;
                return;
            }

            await supabase
                .from('serials')
                .update({ used_by: session.user.email, used_at: now, deleted_at: null, original_owner: null })
                .eq('serial_code', code);

            sucEl.textContent = '등록 완료! 잠시 후 이동합니다.';
            sucEl.style.display = 'block';
            btn.textContent = '완료';
            const afterLogin = localStorage.getItem('gyeol_after_login');
            if (afterLogin) {
                localStorage.removeItem('gyeol_after_login');
                setTimeout(() => { window.location.replace(afterLogin); }, 1500);
            } else {
                setTimeout(() => { window.location.replace('search.html'); }, 1500);
            }
        });

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.replace('login.html');
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('submit-btn').click();
            }
        });
    </script>
