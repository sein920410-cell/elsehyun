<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>공간:결 - 시리얼 번호 등록</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>body { font-family: 'Pretendard', sans-serif; background-color: #0C1220; color: white; }</style>
</head>
<body>
    <div class="max-w-sm mx-auto min-h-screen flex flex-col justify-center px-6">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-bold tracking-tight">공간:결</h1>
            <p class="text-gray-400 text-sm mt-2">제품 시리얼 번호를 등록해주세요</p>
        </div>
        <div class="bg-gray-800 rounded-2xl p-8 space-y-5">
            <div>
                <label class="block text-sm text-gray-400 mb-1">시리얼 번호</label>
                <input id="serial" type="text" placeholder="시리얼 번호를 입력하세요"
                    class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white text-sm outline-none focus:border-blue-500 transition uppercase tracking-widest">
            </div>
            <div id="error-msg" class="text-red-400 text-sm text-center hidden"></div>
            <div id="success-msg" class="text-green-400 text-sm text-center hidden"></div>
            <button id="submit-btn"
                class="w-full bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-semibold py-3 rounded-xl transition text-sm">
                등록하기
            </button>
            <button id="logout-btn" class="w-full text-gray-500 text-xs py-2 hover:text-gray-300 transition">
                로그아웃
            </button>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        const supabase = createClient(
            'https://tqhtggusphhcsygiitrv.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxaHRnZ3VzcGhoY3N5Z2lpdHJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwNDMxMTMsImV4cCI6MjA4NjYxOTExM30.HXA2GbucJPkt3LFl9_JpLiwUQvI95QNEDeQWzQ9i-pc'
        );

        let currentSession = null;

        // 1. 세션 확인
        const { data: { session } } = await supabase.auth.getSession();

        if (!session) {
            window.location.replace('login.html');
        } else {
            // 이미 등록된 유저면 메인으로
            const { data: existing } = await supabase
                .from('serials')
                .select('id')
                .eq('used_by', session.user.email)
                .maybeSingle();

            if (existing) {
                window.location.replace('index.html');
            } else {
                currentSession = session;
            }
        }

        // 2. 등록하기 버튼
        document.getElementById('submit-btn').addEventListener('click', async () => {
            const session = currentSession;
            const code = document.getElementById('serial').value.trim().toUpperCase();
            const errEl = document.getElementById('error-msg');
            const sucEl = document.getElementById('success-msg');
            const btn = document.getElementById('submit-btn');

            errEl.classList.add('hidden');
            sucEl.classList.add('hidden');

            if (!code) {
                errEl.textContent = '시리얼 번호를 입력해주세요.';
                errEl.classList.remove('hidden');
                return;
            }
            if (!session) {
                window.location.replace('login.html');
                return;
            }

            btn.textContent = '확인 중...';
            btn.disabled = true;

            // serials 테이블에서 시리얼 조회
            const { data: serial, error } = await supabase
                .from('serials')
                .select('*')
                .eq('serial_code', code)
                .is('used_by', null)
                .maybeSingle();

            if (error || !serial) {
                errEl.textContent = '유효하지 않은 시리얼 번호예요. 다시 확인해주세요.';
                errEl.classList.remove('hidden');
                btn.textContent = '등록하기';
                btn.disabled = false;
                return;
            }

            // 세트번호로 QR 태그 3개 한꺼번에 등록
            const setNum = serial.set_number;
            const now = new Date().toISOString();
            const tagCodes = [
                `GYEOL-${setNum}-MAIN`,
                `GYEOL-${setNum}-DR1`,
                `GYEOL-${setNum}-DR2`
            ];

            const { error: tagError } = await supabase
                .from('serial_codes')
                .update({ used_by: session.user.email, used_at: now })
                .in('code', tagCodes);

            if (tagError) {
                errEl.textContent = '등록 중 오류가 발생했어요. 다시 시도해주세요.';
                errEl.classList.remove('hidden');
                btn.textContent = '등록하기';
                btn.disabled = false;
                return;
            }

            // serials 테이블에 사용자 이메일 기록
            await supabase
                .from('serials')
                .update({ used_by: session.user.email, used_at: now })
                .eq('serial_code', code);

            sucEl.textContent = '등록 완료! 잠시 후 이동합니다.';
            sucEl.classList.remove('hidden');
            btn.textContent = '완료';
            setTimeout(() => { window.location.replace('index.html'); }, 1500);
        });

        // 3. 로그아웃 버튼
        document.getElementById('logout-btn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.replace('login.html');
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('submit-btn').click();
        });
    </script>
</body>
</html>
