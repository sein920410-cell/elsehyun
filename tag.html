<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>공간:결</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #0C1220; color: white; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
    </style>
</head>
<body>
    <div class="max-w-sm mx-auto min-h-screen flex flex-col justify-center px-6">

        <!-- 로딩 상태 -->
        <div id="state-loading" class="text-center">
            <div class="flex justify-center mb-6">
                <svg class="spinner w-8 h-8 text-blue-400" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                </svg>
            </div>
            <p class="text-gray-400 text-sm">태그를 확인하는 중이에요...</p>
        </div>

        <!-- 유효하지 않은 태그 (코드 형식 오류) -->
        <div id="state-no-code" class="hidden fade-in text-center">
            <div class="text-5xl mb-5">🏷️</div>
            <h2 class="text-xl font-bold mb-2">유효하지 않은 태그예요</h2>
            <p class="text-gray-400 text-sm mb-6">QR코드를 다시 스캔해주세요.</p>
            <button onclick="location.href='index.html'" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-semibold py-3 rounded-xl transition text-sm">
                홈으로 이동
            </button>
        </div>

        <!-- 다른 사용자의 태그 -->
        <div id="state-taken" class="hidden fade-in text-center">
            <div class="text-5xl mb-5">🔒</div>
            <h2 class="text-xl font-bold mb-2">이미 등록된 태그예요</h2>
            <p class="text-gray-400 text-sm mb-6">다른 사용자가 등록한 태그입니다.<br>본인 태그가 아닌 경우 고객센터로 문의해주세요.</p>
            <button onclick="location.href='index.html'" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-semibold py-3 rounded-xl transition text-sm">
                내 보관함으로
            </button>
        </div>

        <!-- DB에 없는 코드 (정품 아님) -->
        <div id="state-invalid" class="hidden fade-in text-center">
            <div class="text-5xl mb-5">❓</div>
            <h2 class="text-xl font-bold mb-2">등록되지 않은 태그예요</h2>
            <p class="text-gray-400 text-sm mb-4">코드: <span id="invalid-code" class="font-mono text-white text-xs bg-gray-700 px-2 py-1 rounded"></span></p>
            <p class="text-gray-500 text-xs">공식 제품이 아닌 경우 이 메시지가 표시될 수 있어요.</p>
        </div>

        <!-- 시리얼 미등록 (패키지 구매 후 앱 등록 안 된 상태) -->
        <div id="state-unregistered" class="hidden fade-in text-center">
            <div class="text-5xl mb-5">📦</div>
            <h2 class="text-xl font-bold mb-2">아직 등록되지 않은 태그예요</h2>
            <p class="text-gray-400 text-sm mb-6">패키지 박스 안의 시리얼 코드를 입력하면<br>바로 사용할 수 있어요.</p>
            <button id="btn-register" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl transition text-sm">
                시리얼 코드 등록하기
            </button>
        </div>

    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const SUPABASE_URL = 'https://tqhtggusphhcsygiitrv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxaHRnZ3VzcGhoY3N5Z2lpdHJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwNDMxMTMsImV4cCI6MjA4NjYxOTExM30.HXA2GbucJPkt3LFl9_JpLiwUQvI95QNEDeQWzQ9i-pc';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        function show(id) {
            ['state-loading','state-no-code','state-taken','state-invalid','state-unregistered'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        // ── 코드 추출 ──────────────────────────────────────────────
        // 1순위: URL 경로 (/GYEOL-1-MAIN)
        // 2순위: 쿼리 파라미터 (?code=GYEOL-1-MAIN)
        function extractCode() {
            const path = window.location.pathname.replace(/^\//, '').replace(/\.html.*$/, '');
            if (path && path.toUpperCase().startsWith('GYEOL-')) return path.toUpperCase();
            const params = new URLSearchParams(window.location.search);
            const q = params.get('code');
            if (q && q.toUpperCase().startsWith('GYEOL-')) return q.toUpperCase();
            return null;
        }

        // ── 코드에서 세트 번호 추출 ────────────────────────────────
        // "GYEOL-1-MAIN" → 1,  "GYEOL-42-DR1" → 42
        // serials 테이블의 set_number 컬럼과 대조하기 위한 값
        function parseSetNumber(code) {
            const parts = code.split('-'); // ["GYEOL", "1", "MAIN"]
            if (parts.length < 3) return null;
            const n = parseInt(parts[1], 10);
            return isNaN(n) ? null : n;
        }

        // ── 태그 타입에 따라 이동할 URL 결정 ─────────────────────
        // MAIN → index.html (보관함 홈)
        // DR1/DR2 → drawer.html?tag=GYEOL-1-DR1 (서랍 화면)
        function getRedirectUrl(code) {
            if (code.endsWith('-MAIN')) return 'index.html';
            return `drawer.html?tag=${encodeURIComponent(code)}`;
        }

        // ── 메인 로직 ──────────────────────────────────────────────
        const code = extractCode();

        if (!code) {
            show('state-no-code');
        } else {
            const setNumber = parseSetNumber(code);

            if (!setNumber) {
                // 코드 형식이 맞지 않으면 (세트 번호를 파싱할 수 없음)
                show('state-no-code');
            } else {
                // 1. 로그인 여부 확인
                const { data: { session } } = await supabase.auth.getSession();

                if (!session) {
                    // 로그인 안 된 경우 → 로그인 후 이 태그 URL로 돌아오도록 현재 주소 저장
                    window.location.replace(`login.html?redirect=${encodeURIComponent(window.location.href)}`);

                } else {
                    // 2. serials 테이블에서 이 세트 번호(set_number)로 등록된 row 조회
                    // serial_code(GYEOL-1-DUFA)가 아니라 set_number(1)로 찾는 것이 핵심
                    // 하나의 세트 번호에 MAIN/DR1/DR2 세 row가 있으므로 maybeSingle 대신 limit(1) 사용
                    const { data: serial } = await supabase
                        .from('serials')
                        .select('used_by, set_number')
                        .eq('set_number', setNumber)
                        .limit(1)
                        .maybeSingle();

                    if (!serial) {
                        // serials 테이블에 이 세트 번호 자체가 없음 → 정품 아님
                        document.getElementById('invalid-code').textContent = code;
                        show('state-invalid');

                    } else if (!serial.used_by) {
                        // 정품 태그인데 아직 아무도 등록 안 한 상태
                        // → 로그인은 됐으니 시리얼 코드 입력 화면으로
                        document.getElementById('btn-register').onclick = () => {
                            window.location.replace('serial.html');
                        };
                        show('state-unregistered');

                    } else if (serial.used_by === session.user.email) {
                        // 내 태그 → 해당 보관함 또는 서랍으로 바로 이동
                        window.location.replace(getRedirectUrl(code));

                    } else {
                        // 다른 사람이 이미 등록한 태그
                        show('state-taken');
                    }
                }
            }
        }
    </script>
</body>
</html>
